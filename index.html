<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>上蔡二高 · 校园墙 · 个人主页</title>
    <!-- 系统字体，无外部依赖 -->
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 默认亮色模式变量 (将通过JS动态更新) */
        :root {
            --bg-start: #f0f4fa;
            --bg-end: #d9e2ef;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --text-primary: #1e2b3c;
            --text-secondary: #3e5569;
            --text-tertiary: #6b7f94;
            --border-light: #d0deed;
            --accent: #2c4c6e;
            --accent-soft: #e1ebf5;
            --card-shadow: 0 10px 30px -8px rgba(0,20,40,0.2);
            --tag-bg: #e6eef8;
            --input-bg: #ffffff;
            --delete-btn: #b55a5a;
            --header-bg: #243b4f;
            --header-text: #ffffff;
            --sidebar-bg: #ffffff;
            --sidebar-text: #1e2b3c;
            --overlay-bg: rgba(0,0,0,0.3);
            --hitokoto-bg: var(--surface-solid);
        }

        /* 暗色模式变量 (亮色模式的互补) */
        body.dark {
            --bg-start: #1a262f;
            --bg-end: #0f1a24;
            --surface: rgba(25,35,45,0.9);
            --surface-solid: #1f2e3a;
            --text-primary: #eaf0f8;
            --text-secondary: #c0d2e2;
            --text-tertiary: #9bb0c2;
            --border-light: #2f4255;
            --accent: #5b8cb0;
            --accent-soft: #253746;
            --card-shadow: 0 10px 30px -8px rgba(0,0,0,0.6);
            --tag-bg: #2d3f50;
            --input-bg: #25323e;
            --delete-btn: #c47a7a;
            --header-bg: #0e1a24;
            --header-text: #eef5fc;
            --sidebar-bg: #1f2e3a;
            --sidebar-text: #eaf0f8;
            --overlay-bg: rgba(0,0,0,0.6);
            --hitokoto-bg: var(--surface-solid);
        }

        body {
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            min-height: 100vh;
            padding: 1.5rem 1rem 6rem;
            display: flex;
            justify-content: center;
            color: var(--text-primary);
            -webkit-overflow-scrolling: touch;
            transition: background 0.3s, color 0.2s;
        }

        .container {
            max-width: 820px;
            width: 100%;
            position: relative;
        }

        /* 头部 */
        .header-card {
            background: var(--header-bg);
            color: var(--header-text);
            border-radius: 2.5rem 2.5rem 1.8rem 1.8rem;
            padding: 1.5rem 2rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 16px 0 -4px rgba(0,0,0,0.2), var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
            transition: background 0.3s, color 0.2s, box-shadow 0.2s;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .menu-icon {
            font-size: 1.8rem;
            cursor: pointer;
            color: white;
            transition: transform 0.2s;
        }

        .header-title {
            font-size: 1.8rem;
            font-weight: 700;
        }

        /* 侧边栏遮罩 */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            backdrop-filter: blur(3px);
            z-index: 999;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .sidebar-overlay.show { visibility: visible; opacity: 1; }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: var(--sidebar-bg);
            box-shadow: 2px 0 20px rgba(0,0,0,0.3);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s ease, background 0.3s, color 0.2s;
            display: flex;
            flex-direction: column;
            padding: 2rem 1.2rem;
            border-right: 2px solid var(--accent);
            color: var(--sidebar-text);
            overflow-y: auto;
        }
        .sidebar.open { transform: translateX(0); }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-light);
        }
        .sidebar-avatar { font-size: 3rem; color: var(--accent); }
        .sidebar-user h4 { font-size: 1.1rem; margin-bottom: 0.2rem; }
        .sidebar-user p { font-size: 0.7rem; opacity: 0.8; }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            background: var(--accent-soft);
            border-radius: 2rem;
            cursor: pointer;
            border: 1px solid var(--border-light);
            transition: 0.2s;
            color: var(--text-primary);
        }
        .sidebar-item:hover { background: var(--accent); color: white; }

        .fun-section {
            background: var(--accent-soft);
            border-radius: 2rem;
            padding: 1.2rem;
            margin-top: auto;
            border: 1px solid var(--border-light);
        }
        .fun-title { font-weight: 600; margin-bottom: 0.8rem; display: flex; gap: 0.5rem; }
        .fun-content {
            font-size: 0.9rem;
            background: var(--surface-solid);
            padding: 0.8rem;
            border-radius: 1.5rem;
            min-height: 60px;
        }
        .fun-refresh { margin-top: 0.5rem; text-align: right; }
        .fun-refresh i {
            cursor: pointer;
            padding: 0.3rem;
            border-radius: 50%;
            background: var(--accent);
            color: white;
        }
        .sidebar-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-tertiary);
        }

        /* 视图切换 */
        .view { display: none; }
        .view.active { display: block; }

        /* 公告栏 */
        .announcement-bar {
            background: var(--accent-soft);
            border-radius: 3rem;
            padding: 1rem 1.8rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 1rem;
            backdrop-filter: blur(10px);
        }

        /* 一言卡片 */
        .hitokoto-card {
            background: var(--hitokoto-bg);
            border-radius: 3rem;
            padding: 0.9rem 1.8rem;
            margin-bottom: 1.8rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            text-align: center;
            font-size: 1rem;
            font-style: italic;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: fit-content;
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        /* 分类标签 */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 5;
        }
        .cat {
            background: var(--tag-bg);
            color: var(--text-secondary);
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background 0.2s, color 0.2s;
        }
        .cat.active { background: var(--accent); color: white; }

        /* 发布卡片 */
        .post-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: 2.5rem;
            padding: 1.5rem 1.5rem 1.2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            position: relative;
            z-index: 4;
            transition: background 0.3s, border-color 0.2s;
        }
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .input-row input, .input-row select, .input-row textarea {
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 3rem;
            padding: 0.8rem 1.2rem;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
            flex: 1 1 auto;
            transition: background 0.3s, border-color 0.2s, color 0.2s;
        }
        .input-row textarea { border-radius: 1.8rem; min-height: 80px; resize: vertical; }
        .publish-actions { display: flex; justify-content: flex-end; gap: 1rem; align-items: center; }
        .btn-primary {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.6rem 2rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #1a3349;
            transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
        }
        .btn-primary:active { transform: translateY(4px); box-shadow: 0 2px 0 #1a3349; }

        /* iOS动态堆叠卡片列表 */
        .feed {
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 1rem 0 20vh;
            min-height: 70vh;
        }

        .feed-item {
            position: relative;
            background: var(--surface-solid);
            border-radius: 2.5rem;
            padding: 1.5rem 1.5rem 1rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform, opacity, margin, filter, z-index;
            transform-origin: center;
            margin-bottom: -30px;
            width: 100%;
            backdrop-filter: blur(2px);
            opacity: 0.9;
            filter: blur(0.3px);
        }

        .feed-item.focused {
            opacity: 1;
            filter: blur(0px);
            transform: scale(1.02);
            box-shadow: 0 30px 50px -15px rgba(0,0,0,0.3);
            border: 1px solid var(--accent);
            z-index: 100 !important;
        }

        .feed-item:not(.focused) .item-content {
            max-height: 4.5em;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, black 70%, transparent);
        }

        .feed-item:not(.focused) .comments-section { display: none !important; }

        .item-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
        }
        .badge-class {
            background: var(--accent-soft);
            color: var(--text-primary);
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .badge-nick {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
        }
        .badge-cat {
            background: var(--tag-bg);
            color: var(--text-secondary);
            padding: 0.2rem 0.9rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .item-time {
            margin-left: auto;
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }
        .item-content {
            font-size: 1rem;
            line-height: 1.5;
            padding: 0.4rem 0 0.8rem;
            white-space: pre-wrap;
        }
        .item-stats {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            border-top: 1px solid var(--border-light);
            padding-top: 0.7rem;
            margin-top: 0.3rem;
            flex-wrap: wrap;
        }
        .stat-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--text-tertiary);
            font-size: 0.85rem;
            cursor: pointer;
        }
        .delete-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--delete-btn);
            cursor: pointer;
            font-size: 0.85rem;
        }
        .post-fingerprint {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            background: var(--accent-soft);
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            margin-left: 0.5rem;
            cursor: help;
            font-family: monospace;
            font-weight: 600;
        }

        .comments-section {
            margin-top: 1rem;
            background: var(--surface);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid var(--border-light);
        }
        .add-comment {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .add-comment input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 3rem;
            padding: 0.5rem 1rem;
        }

        /* 个人主页卡片 */
        .identity-card, .profile-card, .lookup-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            transition: background 0.3s, border-color 0.2s;
        }

        /* 弹窗 */
        .dialog {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .dialog.show { visibility: visible; opacity: 1; }
        .dialog-box {
            background: var(--surface-solid);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 350px;
            width: 90%;
            border: 2px solid var(--accent);
        }
        .dialog-box input, .dialog-box textarea {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            border: 1px solid var(--border-light);
            background: var(--input-bg);
            color: var(--text-primary);
            margin: 1rem 0;
        }
        .dialog-actions { display: flex; justify-content: flex-end; gap: 0.8rem; }
        .dialog-actions button {
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            border: none;
            cursor: pointer;
            background: var(--accent);
            color: white;
        }
        #cancelAnnounce, #cancelDelete { background: var(--text-tertiary); }
        .loading { text-align: center; padding: 2rem; color: var(--text-tertiary); }
    </style>
    <!-- 外部库：FingerprintJS 和 UA Parser (国内CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ua-parser-js@1.0.35/dist/ua-parser.min.js"></script>
    <!-- Font Awesome 6 (BootCDN) -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header-card">
            <div class="header-left">
                <i class="fas fa-bars menu-icon" id="menuIcon"></i>
                <span class="header-title">上蔡二高</span>
            </div>
        </div>

        <!-- 侧边栏遮罩 -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- 侧边栏 -->
        <div class="sidebar" id="sidebar">
            <i class="fas fa-times sidebar-close" id="closeSidebar"></i>
            <div class="sidebar-header">
                <div class="sidebar-avatar"><i class="fas fa-user-circle"></i></div>
                <div class="sidebar-user">
                    <h4 id="sidebarNickname">加载中...</h4>
                    <p id="sidebarShortId">ID: 加载中...</p>
                </div>
            </div>
            <div class="sidebar-menu">
                <div class="sidebar-item" id="sidebarProfileBtn"><i class="fas fa-home"></i><span>我的主页</span></div>
                <div class="sidebar-item" id="sidebarThemeToggle"><i class="fas fa-moon" id="sidebarThemeIcon"></i><span>暗色模式</span></div>
                <div class="sidebar-item" id="sidebarMagicBtn"><i class="fas fa-magic"></i><span>神奇换色</span></div>
                <div class="sidebar-item" id="sidebarAnnounceBtn"><i class="fas fa-bullhorn"></i><span>公告管理</span></div>
            </div>
            <div class="fun-section">
                <div class="fun-title"><i class="fas fa-grin-squint"></i> 校园趣味角</div>
                <div class="fun-content" id="funContent">点击刷新获取今日份快乐~</div>
                <div class="fun-refresh"><i class="fas fa-sync-alt" id="refreshFun"></i></div>
            </div>
        </div>

        <!-- 公告栏 -->
        <div id="announcementBar" class="announcement-bar" style="display: none;">
            <i class="fas fa-bullhorn"></i>
            <span class="announcement-text" id="announcementText"></span>
        </div>

        <!-- 一言卡片 -->
        <div class="hitokoto-card" id="hitokotoContainer">
            <i class="fas fa-quote-right"></i>
            <span class="hitokoto-text" id="hitokotoText">加载一句心里话...</span>
        </div>

        <!-- 校园墙视图 -->
        <div id="wallView" class="view active">
            <div class="categories" id="categoryFilter">
                <span class="cat active" data-cat="all">全部</span>
                <span class="cat" data-cat="表白墙">💌 表白墙</span>
                <span class="cat" data-cat="失物招领">🔍 失物招领</span>
                <span class="cat" data-cat="求助">🆘 求助</span>
                <span class="cat" data-cat="树洞">🌳 树洞</span>
                <span class="cat" data-cat="二手">📦 二手</span>
                <span class="cat" data-cat="其他">📌 其他</span>
            </div>

            <div class="post-card">
                <h3><i class="fas fa-pen-fancy"></i> 发布新帖</h3>
                <div class="input-row">
                    <input type="text" id="postClass" placeholder="班级 (如 高三14班)">
                    <input type="text" id="postNick" placeholder="昵称 (如 小月亮)">
                    <select id="postCategory">
                        <option value="表白墙">表白墙</option>
                        <option value="失物招领">失物招领</option>
                        <option value="求助">求助</option>
                        <option value="树洞">树洞</option>
                        <option value="二手">二手</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <textarea id="postContent" placeholder="说点什么吧…" rows="2"></textarea>
                <div class="publish-actions">
                    <span id="charCount">0/500</span>
                    <button class="btn-primary" id="publishWallBtn">发布</button>
                </div>
            </div>

            <div id="wallFeed" class="feed">
                <div class="loading"><i class="fas fa-spinner fa-pulse"></i> 加载帖子中...</div>
            </div>
        </div>

        <!-- 个人主页视图 -->
        <div id="profileView" class="view">
            <div class="identity-card">
                <div class="identity-row" style="display: flex; align-items: center; gap: 1rem;">
                    <div class="device-icon"><i class="fas fa-mobile-alt"></i></div>
                    <div>
                        <div class="device-model" id="profileDeviceModel">识别设备...</div>
                        <div class="device-fingerprint" id="profileShortId">5位ID: 加载中...</div>
                    </div>
                </div>
            </div>
            <div class="lookup-card">
                <input type="text" id="lookupShortId" placeholder="输入5位数字ID查看主页">
                <button id="lookupProfileBtn"><i class="fas fa-search"></i> 查看</button>
            </div>
            <div id="profileContent"></div>
        </div>

        <!-- 删除确认弹窗 -->
        <div class="dialog" id="deleteDialog">
            <div class="dialog-box">
                <p><i class="fas fa-trash-alt" style="color:var(--delete-btn);"></i> 输入管理密码以删除</p>
                <input type="password" id="deletePass" placeholder="密码">
                <div class="dialog-actions">
                    <button id="cancelDelete">取消</button>
                    <button id="confirmDelete">确认删除</button>
                </div>
            </div>
        </div>

        <!-- 公告管理弹窗 -->
        <div class="dialog" id="announceDialog">
            <div class="dialog-box">
                <p><i class="fas fa-bullhorn" style="color:var(--accent);"></i> 管理公告</p>
                <input type="password" id="announcePass" placeholder="管理密码">
                <textarea id="announceContent" placeholder="公告内容" rows="3"></textarea>
                <div class="dialog-actions">
                    <button id="cancelAnnounce">取消</button>
                    <button id="saveAnnounce">保存公告</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== 配置 ==========
            const JSONBIN_KEY = '$2a$10$9z248RcrjjqcUz1byk73Ie5SZ/L0FpjHdBDo6jBPxpwmCKc/qOeFi';
            const JSONBIN_BIN_ID = '69afdb8bef73d7764563db24';
            const ADMIN_PASS = 'admin123';
            const STORAGE_KEY = 'sgep_backup';        // 本地备份key
            const STORAGE_KEY_LAST = 'sgep_last_good'; // 上次成功备份

            // ========== 5位数字ID生成器 ==========
            class ShortIdGenerator {
                constructor() {
                    this.idMap = {};      // 长指纹 -> 5位数字
                    this.reverseMap = {};  // 5位数字 -> 长指纹
                    this.usedIds = new Set();
                }

                loadFromProfiles(profiles) {
                    this.idMap = {};
                    this.reverseMap = {};
                    this.usedIds.clear();
                    for (let longFp in profiles) {
                        const profile = profiles[longFp];
                        if (profile && profile.shortId) {
                            const shortId = profile.shortId;
                            this.idMap[longFp] = shortId;
                            this.reverseMap[shortId] = longFp;
                            this.usedIds.add(shortId);
                        }
                    }
                }

                generateUniqueId() {
                    const min = 10000, max = 99999;
                    for (let i = 0; i < 20; i++) {
                        const id = Math.floor(Math.random() * (max - min + 1)) + min;
                        if (!this.usedIds.has(id)) return id;
                    }
                    for (let id = min; id <= max; id++) {
                        if (!this.usedIds.has(id)) return id;
                    }
                    return null;
                }

                getOrCreateShortId(longFingerprint, profiles) {
                    this.loadFromProfiles(profiles);
                    if (this.idMap[longFingerprint]) return this.idMap[longFingerprint];
                    const shortId = this.generateUniqueId();
                    if (shortId) {
                        this.idMap[longFingerprint] = shortId;
                        this.reverseMap[shortId] = longFingerprint;
                        this.usedIds.add(shortId);
                    }
                    return shortId;
                }

                getLongIdByShort(shortId) {
                    return this.reverseMap[shortId] || null;
                }

            // ========== 神奇换色 - 生成协调色板并应用 ==========
            function generateHarmoniousPalette() {
                // 随机主色相 (0-360)
                const hue = Math.floor(Math.random() * 360);
                // 主色 (accent) : 中高明度，中高饱和度
                const accent = `hsl(${hue}, 70%, 45%)`;  
                // 辅色 (accent-soft) : 同色相，低饱和度，高明度
                const accentSoft = `hsl(${hue}, 20%, 90%)`;
                // 背景渐变起始 : 同色相，低饱和度，高明度
                const bgStart = `hsl(${hue}, 30%, 92%)`;
                // 背景渐变结束 : 色相偏移 +20，略低明度
                const bgEnd = `hsl(${(hue + 20) % 360}, 25%, 82%)`;
                // 头部背景 : 同色相，中饱和度，低明度
                const headerBg = `hsl(${hue}, 40%, 25%)`;
                // 删除按钮色 : 补色或相近色
                const deleteBtn = `hsl(${(hue + 180) % 360}, 60%, 60%)`;
                // 卡片表面 (半透明白色/黑色) 保持不变，或者也可以调整
                // 我们保留原有的半透明表面，但为了协调，可微调
                // 这里我们只返回需要修改的变量
                return {
                    '--accent': accent,
                    '--accent-soft': accentSoft,
                    '--bg-start': bgStart,
                    '--bg-end': bgEnd,
                    '--header-bg': headerBg,
                    '--delete-btn': deleteBtn,
                    // 可以再添加暗色模式对应的变量，但为了简化，我们让暗色模式切换时覆盖
                };
            }

            }

            // ========== iOS动态遮挡效果 ==========
            let rafId = null;
            function updateCardFocus() {
                const cards = document.querySelectorAll('.feed-item');
                if (!cards.length) return;
                const viewportCenter = window.innerHeight / 2 + window.scrollY;
                const maxDistance = window.innerHeight * 0.7;
                cards.forEach(c => c.classList.remove('focused'));
                let closest = null, closestDist = Infinity;
                cards.forEach(c => {
                    const rect = c.getBoundingClientRect();
                    const center = rect.top + window.scrollY + rect.height/2;
                    const dist = Math.abs(center - viewportCenter);
                    if (dist < closestDist) { closestDist = dist; closest = c; }
                });
                cards.forEach(c => {
                    const rect = c.getBoundingClientRect();
                    const center = rect.top + window.scrollY + rect.height/2;
                    const dist = Math.abs(center - viewportCenter);
                    let weight = Math.max(0, 1 - (dist / maxDistance));
                    weight = Math.min(1, weight);
                    if (c === closest) { weight = 1; c.classList.add('focused'); }
                    c.style.zIndex = Math.floor(20 + weight * 80);
                    const overlap = 20 + 60 * (1 - weight);
                    c.style.marginBottom = `-${overlap}px`;
                    c.style.opacity = 0.85 + weight * 0.15;
                    c.style.filter = `blur(${(1-weight)*1.2}px)`;
                    c.style.transform = `scale(${0.96 + weight*0.06})`;
                });
            }
            window.addEventListener('scroll', () => { if (rafId) cancelAnimationFrame(rafId); rafId = requestAnimationFrame(updateCardFocus); });

            // ========== 数据备份与恢复 ==========
            function backupToLocal(data) {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

                    localStorage.setItem(STORAGE_KEY_LAST, JSON.stringify(data));
                } catch (e) {}
            }

            function loadBackupFromLocal() {
                try {
                    const backup = localStorage.getItem(STORAGE_KEY);
                    return backup ? JSON.parse(backup) : null;
                } catch (e) { return null; }
            }

            function loadLastGoodBackup() {
                try {
                    const backup = localStorage.getItem(STORAGE_KEY_LAST);
                    return backup ? JSON.parse(backup) : null;
                } catch (e) { return null; }
            }

            // ========== 数据操作 ==========
            async function loadData() {
                // 先尝试从本地备份恢复显示（如果有）
                const localBackup = loadBackupFromLocal();
                if (localBackup) {
                    appState.wallPosts = localBackup.posts || [];
                    appState.profiles = localBackup.profiles || {};
                    appState.announcement = localBackup.announcement || '';
                    // 立即渲染一次，让用户看到内容
                    renderWallPosts();
                    updateAnnouncementBar();
                }

                try {
                    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                        headers: { 'X-Master-Key': JSONBIN_KEY, 'X-Bin-Meta': false }
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    // 检查云端数据是否有效（posts 存在且为数组）
                    if (data && Array.isArray(data.posts)) {
                        // 如果云端数据为空数组，但本地有数据，则询问是否覆盖
                        if (data.posts.length === 0 && localBackup && localBackup.posts.length > 0) {
                            if (confirm('云端数据为空，是否用本地备份恢复？点击取消将使用空数据。')) {
                                // 保持本地数据不变，但不再更新云端（不保存）
                                // 但我们可以提示用户
                                alert('已保留本地数据。');
                                return; // 不更新内存，不保存到云端
                            } else {
                                // 用户确认使用空数据，更新内存
                                appState.wallPosts = data.posts;
                                appState.profiles = data.profiles || {};
                                appState.announcement = data.announcement || '';
                            }
                        } else {
                            // 正常更新
                            appState.wallPosts = data.posts;
                            appState.profiles = data.profiles || {};
                            appState.announcement = data.announcement || '';
                        }
                        // 更新备份
                        backupToLocal({ posts: appState.wallPosts, profiles: appState.profiles, announcement: appState.announcement });
                    } else {
                        throw new Error('无效数据格式');
                    }
                } catch (e) {
                    console.warn('从云端加载失败，使用本地备份', e);
                    // 如果本地备份没有，则维持现有数据（可能是空）
                    if (!localBackup) {
                        // 首次加载且云端失败，使用空数据
                        appState.wallPosts = [];
                        appState.profiles = {};
                        appState.announcement = '';
                    } else {
                        // 已有本地备份，保持不变
                    }
                } finally {
                    // 重新渲染确保最新
                    renderWallPosts();
                    updateAnnouncementBar();
                }
            }

            async function saveData() {
                // 在保存前，检查是否要保存空数据
                if (appState.wallPosts.length === 0) {
                    const lastGood = loadLastGoodBackup();
                    if (lastGood && lastGood.posts && lastGood.posts.length > 0) {
                        if (!confirm('您正在保存空数据，这将会清空云端所有帖子。确定要继续吗？')) {
                            return; // 取消保存
                        }
                    }
                }
                try {
                    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
                        body: JSON.stringify({ posts: appState.wallPosts, profiles: appState.profiles, announcement: appState.announcement })
                    });
                    // 保存成功后更新本地备份
                    backupToLocal({ posts: appState.wallPosts, profiles: appState.profiles, announcement: appState.announcement });
                } catch (e) { 
                    alert('保存失败: ' + e.message);
                }
            }

                });
            }

            function setActiveView(view) {
                if (view === 'wall') { wallView.classList.add('active'); profileView.classList.remove('active'); }
                else { wallView.classList.remove('active'); profileView.classList.add('active'); }
            }

            async function publishWallPost() {
                const className = postClass.value.trim() || '未填班级';
                const nick = postNick.value.trim() || '匿名';
                const category = postCategory.value;
                const content = postContent.value.trim();
                if (!content) return alert('内容不能为空');
                const newPost = {
                    id: Date.now() + '-' + Math.random().toString(36).substr(2,6),
                    fingerprint: appState.myFingerprint,
                    class: className,
                    nickname: nick,
                    category: category,
                    content: content,
                    time: new Date().toLocaleString('zh-CN', { hour12: false }),
                    likes: 0,
                    comments: []
                };
                appState.wallPosts.unshift(newPost);
                await saveData();
                postContent.value = ''; charCount.textContent = '0/500'; postClass.value = ''; postNick.value = '';
                renderWallPosts();
                if (profileView.classList.contains('active') && appState.viewingProfileShortId === appState.myShortId) renderProfile(appState.myFingerprint);
            }

            function escapeHtml(unsafe) {
                if (!unsafe) return unsafe;
                return unsafe.replace(/[&<>"]/g, m => {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            // ========== 初始化 ==========
            (async function init() {
                const fp = await FingerprintJS.load();
                const result = await fp.get();
                appState.myFingerprint = result.visitorId;

                const parser = new UAParser();
                const ua = parser.getResult();
                appState.myDeviceInfo = {
                    model: ua.device.model || '未知设备',
                    os: ua.os.name || '未知系统',
                    browser: ua.browser.name || '未知浏览器'
                };
                profileDeviceModel.textContent = `${appState.myDeviceInfo.model} · ${appState.myDeviceInfo.os}`;

                // 先加载本地备份（在loadData中会处理），但我们需要先确保profiles存在
                // 这里先尝试加载一次数据
                await loadData();

                appState.myShortId = shortIdGen.getOrCreateShortId(appState.myFingerprint, appState.profiles);
                if (!appState.profiles[appState.myFingerprint]) {
                    appState.profiles[appState.myFingerprint] = {
                        shortId: appState.myShortId,
                        profile: { nickname: `同学${appState.myShortId}`, bio: '' },
                        posts: []
                    };
                } else {
                    appState.profiles[appState.myFingerprint].shortId = appState.myShortId;
                }
                await saveData(); // 保存当前用户信息

                profileShortIdSpan.textContent = `5位ID: ${appState.myShortId}`;
                sidebarShortIdSpan.textContent = `ID: ${appState.myShortId}`;
                sidebarNickname.textContent = appState.profiles[appState.myFingerprint].profile.nickname;
                appState.viewingProfileShortId = appState.myShortId;

                updateHitokoto();
                updateFunContent();
                updateAnnouncementBar();
                renderWallPosts();

                // 分类点击
                categorySpans.forEach(s => {
                    s.addEventListener('click', () => {
                        categorySpans.forEach(c => c.classList.remove('active'));
                        s.classList.add('active');
                        appState.currentWallCategory = s.dataset.cat;
                        renderWallPosts();
                    });
                });

                // 发布按钮
                publishWallBtn.addEventListener('click', publishWallPost);
                postContent.addEventListener('input', () => { charCount.textContent = postContent.value.length + '/500'; });

                // 按5位ID查找
                lookupProfileBtn.addEventListener('click', async () => {
                    const short = lookupShortId.value.trim();
                    if (!short || !/^\d{5}$/.test(short)) { alert('请输入5位数字ID'); return; }
                    await loadData();
                    const long = shortIdGen.getLongIdByShort(parseInt(short));
                    if (!long || !appState.profiles[long]) { alert('该ID不存在'); return; }
                    appState.viewingProfileShortId = short;
                    renderProfile(long);
                    setActiveView('profile');
                });

                // 删除确认
                cancelDelete.addEventListener('click', () => deleteDialog.classList.remove('show'));
                confirmDel.addEventListener('click', async () => {
                    if (deletePass.value.trim() !== ADMIN_PASS) { alert('密码错误'); return; }
                    const t = appState.deleteTarget;
                    if (t.source === 'wall') {
                        appState.wallPosts = appState.wallPosts.filter(p => p.id !== t.postId);
                        await saveData();
                        renderWallPosts();
                    } else if (t.source === 'profile') {
                        const user = appState.profiles[appState.myFingerprint];
                        if (user) {
                            user.posts = user.posts.filter(p => p.id !== t.postId);
                            await saveData();
                            renderProfile(appState.myFingerprint);
                        }
                    }
                    deleteDialog.classList.remove('show');
                });

                // 初始化时应用一次随机颜色（可选）
                // applyRandomTheme();
            })();
        })();
    </script>
</body>
</html>
