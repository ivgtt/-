<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上蔡二高 · 校园墙 + 个人主页</title>
    <!-- 圆润字体 & 图标库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- FingerprintJS 和 UA Parser -->
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ua-parser-js@1.0.35/dist/ua-parser.min.js"></script>
    <style>
        /* 全局变量 – 亮色模式 (默认) */
        :root {
            --bg-gradient-start: #f0f4fa;
            --bg-gradient-end: #d9e2ef;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --text-primary: #1e2b3c;
            --text-secondary: #3e5569;
            --text-tertiary: #6b7f94;
            --border-light: #d0deed;
            --accent: #2c4c6e;
            --accent-soft: #e1ebf5;
            --card-shadow: 0 8px 20px -12px rgba(0,20,40,0.25);
            --tag-bg: #e6eef8;
            --input-bg: #ffffff;
            --placeholder: #9aafc4;
            --delete-btn: #b55a5a;
            --header-bg: #243b4f;
            --header-text: #ffffff;
        }

        /* 暗色模式 */
        body.dark {
            --bg-gradient-start: #1a262f;
            --bg-gradient-end: #0f1a24;
            --surface: rgba(25, 35, 45, 0.9);
            --surface-solid: #1f2e3a;
            --text-primary: #eaf0f8;
            --text-secondary: #c0d2e2;
            --text-tertiary: #9bb0c2;
            --border-light: #2f4255;
            --accent: #5b8cb0;
            --accent-soft: #253746;
            --card-shadow: 0 8px 20px -8px rgba(0,0,0,0.6);
            --tag-bg: #2d3f50;
            --input-bg: #25323e;
            --placeholder: #728da5;
            --delete-btn: #c47a7a;
            --header-bg: #0e1a24;
            --header-text: #eef5fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
            transition: background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 1.5rem 1rem 3rem;
            display: flex;
            justify-content: center;
            color: var(--text-primary);
        }

        .container {
            max-width: 820px;
            width: 100%;
        }

        /* 头部卡片 (整合导航) */
        .header-card {
            background: var(--header-bg);
            color: var(--header-text);
            border-radius: 2.5rem 2.5rem 1.8rem 1.8rem;
            padding: 2rem 2rem 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 16px 0 -4px rgba(0,0,0,0.2), var(--card-shadow);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .header-title small {
            font-size: 1rem;
            font-weight: 400;
            margin-left: 0.8rem;
            opacity: 0.8;
        }

        .header-sub {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.8rem;
            font-weight: 400;
            color: rgba(255,255,255,0.8);
        }

        .nav-buttons {
            display: flex;
            gap: 0.8rem;
        }

        .nav-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 3rem;
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            backdrop-filter: blur(4px);
            color: white;
        }

        .nav-btn.active {
            background: var(--accent);
            border-color: white;
        }

        .theme-toggle {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 3rem;
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            backdrop-filter: blur(4px);
        }

        /* 视图切换 */
        .view {
            display: none;
        }
        .view.active {
            display: block;
        }

        /* ---------- 校园墙样式 ---------- */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .cat {
            background: var(--tag-bg);
            color: var(--text-secondary);
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .cat.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .post-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: 2.2rem;
            padding: 1.5rem 1.5rem 1.2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
        }
        .post-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-primary);
        }
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .input-row input, .input-row select, .input-row textarea {
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 3rem;
            padding: 0.8rem 1.2rem;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
            flex: 1 1 auto;
        }
        .input-row textarea {
            border-radius: 1.8rem;
            min-height: 80px;
            width: 100%;
            resize: vertical;
        }
        .publish-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            align-items: center;
        }
        .btn-primary {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.6rem 2rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #1a3349;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .feed {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }
        .feed-item {
            background: var(--surface-solid);
            border-radius: 2rem;
            padding: 1.5rem 1.5rem 1rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
        }
        .item-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
        }
        .badge-class {
            background: var(--accent-soft);
            color: var(--text-primary);
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .badge-nick {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
        }
        .badge-cat {
            background: var(--tag-bg);
            color: var(--text-secondary);
            padding: 0.2rem 0.9rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .item-time {
            margin-left: auto;
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }
        .item-content {
            font-size: 1rem;
            line-height: 1.5;
            padding: 0.4rem 0 0.8rem;
            white-space: pre-wrap;
        }
        .item-stats {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            border-top: 1px solid var(--border-light);
            padding-top: 0.7rem;
            margin-top: 0.3rem;
            flex-wrap: wrap;
        }
        .stat-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--text-tertiary);
            font-size: 0.85rem;
            cursor: pointer;
        }
        .delete-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--delete-btn);
            cursor: pointer;
            font-size: 0.85rem;
        }
        /* 新增：显示指纹ID的样式 */
        .post-fingerprint {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            background: var(--accent-soft);
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            margin-left: 0.5rem;
            cursor: help;
        }
        .comments-section {
            margin-top: 1rem;
            background: var(--surface);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid var(--border-light);
        }
        .comment-item {
            padding: 0.5rem 0;
            border-bottom: 1px dashed var(--border-light);
        }
        .comment-meta {
            display: flex;
            gap: 0.5rem;
            font-size: 0.8rem;
        }
        .comment-nick {
            font-weight: 600;
        }
        .comment-content {
            font-size: 0.9rem;
            padding-left: 0.5rem;
        }
        .add-comment {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .add-comment input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 3rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }

        /* 个人主页样式 */
        .identity-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
        }
        .identity-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .device-icon {
            font-size: 2.5rem;
            color: var(--accent);
        }
        .device-model {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .device-fingerprint {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            word-break: break-all;
        }
        .profile-card {
            background: var(--surface-solid);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
        }
        .profile-field {
            margin-bottom: 1.2rem;
        }
        .profile-field label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-secondary);
        }
        .profile-field input, .profile-field textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 2rem;
            padding: 0.8rem 1.2rem;
            font-size: 0.95rem;
            color: var(--text-primary);
            outline: none;
        }
        .profile-field textarea {
            min-height: 80px;
            resize: vertical;
        }
        .save-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.6rem 2rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #1a3349;
        }

        .lookup-card {
            background: var(--surface);
            border-radius: 2rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .lookup-card input {
            flex: 1;
            min-width: 200px;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 3rem;
            padding: 0.6rem 1.2rem;
            color: var(--text-primary);
        }
        .lookup-card button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 3rem;
            cursor: pointer;
        }

        /* 帖子来源标记 */
        .source-tag {
            font-size: 0.65rem;
            background: var(--accent-soft);
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            color: var(--text-secondary);
            margin-left: 0.5rem;
        }

        /* 弹窗 */
        .dialog {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .dialog.show {
            visibility: visible;
            opacity: 1;
        }
        .dialog-box {
            background: var(--surface-solid);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 350px;
            width: 90%;
            border: 2px solid var(--accent);
        }
        .dialog-box input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            border: 1px solid var(--border-light);
            background: var(--input-bg);
            color: var(--text-primary);
            margin: 1rem 0;
        }
        .dialog-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-tertiary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 + 导航 -->
        <div class="header-card">
            <div class="header-title">
                上蔡县第二高级中学 <small>SHANGCAI NO.2 HIGH SCHOOL</small>
            </div>
            <div class="header-sub">
                <div class="nav-buttons">
                    <button class="nav-btn active" id="navWallBtn"><i class="fas fa-comment-dots"></i> 校园墙</button>
                    <button class="nav-btn" id="navProfileBtn"><i class="fas fa-user"></i> 我的主页</button>
                </div>
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i> 暗色 / <i class="fas fa-sun"></i> 亮色
                </div>
            </div>
        </div>

        <!-- 校园墙视图 -->
        <div id="wallView" class="view active">
            <div class="categories" id="categoryFilter">
                <span class="cat active" data-cat="all">全部</span>
                <span class="cat" data-cat="表白墙">💌 表白墙</span>
                <span class="cat" data-cat="失物招领">🔍 失物招领</span>
                <span class="cat" data-cat="求助">🆘 求助</span>
                <span class="cat" data-cat="树洞">🌳 树洞</span>
                <span class="cat" data-cat="二手">📦 二手</span>
                <span class="cat" data-cat="其他">📌 其他</span>
            </div>

            <div class="post-card">
                <h3><i class="fas fa-pen-fancy"></i> 发布新帖 · 匿名但留下班级与昵称</h3>
                <div class="input-row">
                    <input type="text" id="postClass" placeholder="班级 (自由输入, 如 高三14班)" value="">
                    <input type="text" id="postNick" placeholder="昵称 (如 小月亮)" value="">
                    <select id="postCategory">
                        <option value="表白墙">表白墙</option>
                        <option value="失物招领">失物招领</option>
                        <option value="求助">求助</option>
                        <option value="树洞">树洞</option>
                        <option value="二手">二手</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <textarea id="postContent" placeholder="说点什么吧…" rows="2"></textarea>
                <div class="publish-actions">
                    <span style="font-size:0.75rem; color:var(--text-tertiary);" id="charCount">0/500</span>
                    <button class="btn-primary" id="publishWallBtn">发布</button>
                </div>
            </div>

            <div id="wallFeed" class="feed">
                <div class="loading"><i class="fas fa-spinner fa-pulse"></i> 加载帖子中...</div>
            </div>
        </div>

        <!-- 个人主页视图 -->
        <div id="profileView" class="view">
            <div class="identity-card">
                <div class="identity-row">
                    <div class="device-icon"><i class="fas fa-mobile-alt"></i></div>
                    <div class="device-info">
                        <div class="device-model" id="profileDeviceModel">正在识别设备...</div>
                        <div class="device-fingerprint" id="profileDeviceFingerprint">指纹ID: 加载中...</div>
                    </div>
                </div>
            </div>

            <div class="lookup-card">
                <input type="text" id="lookupFingerprint" placeholder="输入他人指纹ID查看主页">
                <button id="lookupProfileBtn"><i class="fas fa-search"></i> 查看</button>
            </div>

            <div id="profileContent"></div>
        </div>

        <!-- 删除确认弹窗 (共用) -->
        <div class="dialog" id="deleteDialog">
            <div class="dialog-box">
                <p><i class="fas fa-trash-alt" style="color:var(--delete-btn);"></i> 输入管理密码以删除</p>
                <input type="password" id="deletePass" placeholder="密码">
                <div class="dialog-actions">
                    <button id="cancelDelete">取消</button>
                    <button class="confirm-delete" id="confirmDelete">确认删除</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== JSONBin 凭据 ==========
            const JSONBIN_KEY = '$2a$10$9z248RcrjjqcUz1byk73Ie5SZ/L0FpjHdBDo6jBPxpwmCKc/qOeFi';
            const JSONBIN_BIN_ID = '69afdb8bef73d7764563db24';
            const ADMIN_PASS = 'admin123';

            // ---------- 全局状态 ----------
            let appState = {
                currentWallCategory: 'all',
                wallPosts: [],               // 校园墙帖子数组
                profiles: {},                 // 个人主页数据 { fingerprint: { profile: {...}, posts: [] } }
                myFingerprint: null,          // 当前设备指纹
                myDeviceInfo: { model: '', os: '', browser: '' },
                viewingProfileFingerprint: null,
                deleteTarget: { type: null, fingerprint: null, postId: null, source: null }  // source 用于区分 'wall' 或 'profile'
            };

            // DOM 元素
            const wallView = document.getElementById('wallView');
            const profileView = document.getElementById('profileView');
            const navWallBtn = document.getElementById('navWallBtn');
            const navProfileBtn = document.getElementById('navProfileBtn');
            const themeToggle = document.getElementById('themeToggle');
            const wallFeed = document.getElementById('wallFeed');
            const profileContent = document.getElementById('profileContent');
            const profileDeviceModel = document.getElementById('profileDeviceModel');
            const profileDeviceFingerprint = document.getElementById('profileDeviceFingerprint');
            const lookupFingerprint = document.getElementById('lookupFingerprint');
            const lookupProfileBtn = document.getElementById('lookupProfileBtn');
            const deleteDialog = document.getElementById('deleteDialog');
            const deletePass = document.getElementById('deletePass');
            const cancelDelete = document.getElementById('cancelDelete');
            const confirmDel = document.getElementById('confirmDelete');

            // 校园墙特有元素
            const categorySpans = document.querySelectorAll('#categoryFilter .cat');
            const postClass = document.getElementById('postClass');
            const postNick = document.getElementById('postNick');
            const postCategory = document.getElementById('postCategory');
            const postContent = document.getElementById('postContent');
            const charCount = document.getElementById('charCount');
            const publishWallBtn = document.getElementById('publishWallBtn');

            // ---------- 初始化 ----------
            (async function init() {
                themeToggle.addEventListener('click', () => {
                    document.body.classList.toggle('dark');
                    const icon = themeToggle.querySelector('i');
                    icon.className = document.body.classList.contains('dark') ? 'fas fa-sun' : 'fas fa-moon';
                });

                // 获取设备指纹和设备信息
                const fp = await FingerprintJS.load();
                const result = await fp.get();
                appState.myFingerprint = result.visitorId;

                const parser = new UAParser();
                const ua = parser.getResult();
                appState.myDeviceInfo = {
                    model: ua.device.model || '未知设备',
                    os: ua.os.name || '未知系统',
                    browser: ua.browser.name || '未知浏览器'
                };
                profileDeviceModel.textContent = `${appState.myDeviceInfo.model} · ${appState.myDeviceInfo.os} · ${appState.myDeviceInfo.browser}`;
                profileDeviceFingerprint.textContent = `指纹ID: ${appState.myFingerprint}`;

                await loadData();

                if (!appState.profiles[appState.myFingerprint]) {
                    appState.profiles[appState.myFingerprint] = {
                        profile: { nickname: `访客${appState.myFingerprint.slice(-4)}`, bio: '' },
                        posts: []
                    };
                }
                appState.viewingProfileFingerprint = appState.myFingerprint;

                renderWallPosts();
                renderProfile(appState.viewingProfileFingerprint);

                navWallBtn.addEventListener('click', () => setActiveView('wall'));
                navProfileBtn.addEventListener('click', () => setActiveView('profile'));

                categorySpans.forEach(span => {
                    span.addEventListener('click', () => {
                        categorySpans.forEach(s => s.classList.remove('active'));
                        span.classList.add('active');
                        appState.currentWallCategory = span.dataset.cat;
                        renderWallPosts();
                    });
                });

                publishWallBtn.addEventListener('click', publishWallPost);
                postContent.addEventListener('input', () => {
                    charCount.textContent = postContent.value.length + '/500';
                });

                lookupProfileBtn.addEventListener('click', async () => {
                    const fp = lookupFingerprint.value.trim();
                    if (!fp) return alert('请输入指纹ID');
                    await loadData();
                    if (!appState.profiles[fp]) {
                        if (confirm('该指纹ID不存在，是否创建新主页？')) {
                            appState.profiles[fp] = {
                                profile: { nickname: `访客${fp.slice(-4)}`, bio: '' },
                                posts: []
                            };
                            await saveData();
                        } else {
                            return;
                        }
                    }
                    appState.viewingProfileFingerprint = fp;
                    renderProfile(fp);
                    setActiveView('profile');
                });

                cancelDelete.addEventListener('click', () => {
                    deleteDialog.classList.remove('show');
                    appState.deleteTarget = { type: null, fingerprint: null, postId: null, source: null };
                });

                confirmDel.addEventListener('click', async () => {
                    const inputPass = deletePass.value.trim();
                    if (inputPass !== ADMIN_PASS) {
                        alert('密码错误');
                        return;
                    }
                    const target = appState.deleteTarget;
                    if (target.source === 'wall') {
                        appState.wallPosts = appState.wallPosts.filter(p => p.id !== target.postId);
                        await saveData();
                        renderWallPosts();
                        if (appState.viewingProfileFingerprint) {
                            renderProfile(appState.viewingProfileFingerprint);
                        }
                    } else if (target.source === 'profile') {
                        const userPosts = appState.profiles[target.fingerprint]?.posts;
                        if (userPosts) {
                            appState.profiles[target.fingerprint].posts = userPosts.filter(p => p.id !== target.postId);
                            await saveData();
                            if (appState.viewingProfileFingerprint === target.fingerprint) {
                                renderProfile(target.fingerprint);
                            }
                        }
                    }
                    deleteDialog.classList.remove('show');
                    appState.deleteTarget = { type: null, fingerprint: null, postId: null, source: null };
                });
            })();

            // ---------- 数据操作 ----------
            async function loadData() {
                try {
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                        headers: { 'X-Master-Key': JSONBIN_KEY, 'X-Bin-Meta': false }
                    });
                    if (!response.ok) throw new Error('加载失败');
                    const data = await response.json();
                    appState.wallPosts = Array.isArray(data.posts) ? data.posts : [];
                    appState.profiles = data.profiles || {};
                } catch (e) {
                    console.error('加载失败', e);
                    appState.wallPosts = [];
                    appState.profiles = {};
                }
            }

            async function saveData() {
                try {
                    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': JSONBIN_KEY
                        },
                        body: JSON.stringify({
                            posts: appState.wallPosts,
                            profiles: appState.profiles
                        })
                    });
                } catch (e) {
                    alert('保存失败: ' + e.message);
                }
            }

            // ---------- 校园墙渲染 (增加指纹显示) ----------
            function renderWallPosts() {
                const filtered = appState.currentWallCategory === 'all'
                    ? appState.wallPosts
                    : appState.wallPosts.filter(p => p.category === appState.currentWallCategory);
                const sorted = [...filtered].sort((a,b) => (b.time || '').localeCompare(a.time || ''));

                if (sorted.length === 0) {
                    wallFeed.innerHTML = '<div class="loading">✨ 还没有帖子，来发布第一条吧</div>';
                    return;
                }

                let html = '';
                sorted.forEach(post => {
                    const comments = post.comments || [];
                    const fingerprintShort = post.fingerprint ? post.fingerprint.slice(-8) : '未知';
                    html += `
                        <div class="feed-item" data-post-id="${post.id}">
                            <div class="item-header">
                                <span class="badge-class" data-fp="${escapeHtml(post.fingerprint || '')}">${escapeHtml(post.class || '未填班级')}</span>
                                <span class="badge-nick" data-fp="${escapeHtml(post.fingerprint || '')}">${escapeHtml(post.nickname || '匿名')}</span>
                                <span class="badge-cat">${escapeHtml(post.category || '其他')}</span>
                                <span class="item-time">${escapeHtml(post.time || '')}</span>
                            </div>
                            <div class="item-content">${escapeHtml(post.content || '').replace(/\n/g, '<br>')}</div>
                            <div class="item-stats">
                                <button class="stat-btn like-btn" data-id="${post.id}"><i class="fa-regular fa-heart"></i> ${post.likes || 0}</button>
                                <button class="stat-btn comment-toggle" data-id="${post.id}"><i class="fa-regular fa-comment"></i> ${comments.length}</button>
                                <span class="post-fingerprint" title="发布者指纹: ${escapeHtml(post.fingerprint || '')}"><i class="fas fa-fingerprint"></i> ${fingerprintShort}</span>
                                <button class="delete-btn" data-id="${post.id}"><i class="fa-regular fa-trash-can"></i> 删除</button>
                            </div>
                            <div class="comments-section" id="comments-${post.id}" style="display: none;">
                                ${comments.map(c => `
                                    <div class="comment-item">
                                        <div class="comment-meta">
                                            <span class="comment-nick">${escapeHtml(c.nickname || '匿名')}</span>
                                            <span class="comment-time">${escapeHtml(c.time || '')}</span>
                                        </div>
                                        <div class="comment-content">${escapeHtml(c.content || '')}</div>
                                    </div>
                                `).join('')}
                                <div class="add-comment">
                                    <input type="text" placeholder="你的昵称" class="comment-nick-input" id="nick-${post.id}">
                                    <input type="text" placeholder="评论内容" class="comment-text-input" id="text-${post.id}">
                                    <button class="add-comment-btn" data-id="${post.id}">发送</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                wallFeed.innerHTML = html;

                // 事件绑定 (点赞、评论、删除、点击作者)
                document.querySelectorAll('#wallView .like-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        const post = appState.wallPosts.find(p => p.id === id);
                        if (post) {
                            post.likes = (post.likes || 0) + 1;
                            await saveData();
                            renderWallPosts();
                            if (appState.viewingProfileFingerprint) {
                                renderProfile(appState.viewingProfileFingerprint);
                            }
                        }
                    });
                });

                document.querySelectorAll('#wallView .comment-toggle').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.id;
                        const section = document.getElementById(`comments-${id}`);
                        if (section) section.style.display = section.style.display === 'none' ? 'block' : 'none';
                    });
                });

                document.querySelectorAll('#wallView .add-comment-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.dataset.id;
                        const nickInput = document.getElementById(`nick-${id}`);
                        const textInput = document.getElementById(`text-${id}`);
                        const nick = nickInput.value.trim() || '匿名';
                        const text = textInput.value.trim();
                        if (!text) return;
                        const post = appState.wallPosts.find(p => p.id === id);
                        if (post) {
                            if (!post.comments) post.comments = [];
                            post.comments.push({
                                nickname: nick,
                                content: text,
                                time: new Date().toLocaleString('zh-CN', { hour12: false })
                            });
                            textInput.value = '';
                            nickInput.value = '';
                            await saveData();
                            renderWallPosts();
                            if (appState.viewingProfileFingerprint) {
                                renderProfile(appState.viewingProfileFingerprint);
                            }
                        }
                    });
                });

                document.querySelectorAll('#wallView .delete-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.id;
                        appState.deleteTarget = { source: 'wall', fingerprint: null, postId: id };
                        deletePass.value = '';
                        deleteDialog.classList.add('show');
                    });
                });

                document.querySelectorAll('#wallView .badge-class, #wallView .badge-nick').forEach(el => {
                    el.addEventListener('click', async () => {
                        const fp = el.dataset.fp;
                        if (!fp) return;
                        await loadData();
                        if (!appState.profiles[fp]) {
                            appState.profiles[fp] = {
                                profile: { nickname: `访客${fp.slice(-4)}`, bio: '' },
                                posts: []
                            };
                            await saveData();
                        }
                        appState.viewingProfileFingerprint = fp;
                        renderProfile(fp);
                        setActiveView('profile');
                    });
                });
            }

            // ---------- 个人主页渲染 (合并校园墙帖子) ----------
            function renderProfile(fingerprint) {
                const userData = appState.profiles[fingerprint];
                if (!userData) {
                    profileContent.innerHTML = '<div class="loading">用户不存在</div>';
                    return;
                }
                const profile = userData.profile;
                const profilePosts = userData.posts || [];

                // 获取该用户在校园墙发布的帖子
                const wallPostsForUser = appState.wallPosts
                    .filter(p => p.fingerprint === fingerprint)
                    .map(p => ({
                        id: p.id,
                        content: p.content,
                        time: p.time,
                        likes: p.likes || 0,
                        source: 'wall',
                        extra: { class: p.class, nickname: p.nickname, category: p.category } // 保留额外信息供显示
                    }));

                // 标记主页动态的来源
                const profilePostsMarked = profilePosts.map(p => ({
                    ...p,
                    source: 'profile'
                }));

                // 合并并按时间倒序
                const allPosts = [...wallPostsForUser, ...profilePostsMarked].sort((a, b) => (b.time || '').localeCompare(a.time || ''));

                const isMine = (fingerprint === appState.myFingerprint);

                let html = `
                    <div class="profile-card">
                        <div class="profile-field">
                            <label>昵称</label>
                            <input type="text" id="profileNick" value="${escapeHtml(profile.nickname || '')}" placeholder="你的昵称" ${isMine ? '' : 'disabled'}>
                        </div>
                        <div class="profile-field">
                            <label>个人简介</label>
                            <textarea id="profileBio" placeholder="介绍一下自己..." ${isMine ? '' : 'disabled'}>${escapeHtml(profile.bio || '')}</textarea>
                        </div>
                        ${isMine ? '<button class="save-btn" id="saveProfileBtn">保存资料</button>' : ''}
                    </div>
                `;

                if (isMine) {
                    html += `
                        <div class="post-card">
                            <h3><i class="fas fa-pen-fancy"></i> 发布动态 (仅主页可见)</h3>
                            <textarea class="post-input" id="profilePostContent" placeholder="说点什么..." rows="2"></textarea>
                            <div class="post-actions">
                                <button class="save-btn" id="publishProfileBtn">发布</button>
                            </div>
                        </div>
                    `;
                }

                html += `<div class="feed" id="profilePostsFeed">`;
                if (allPosts.length === 0) {
                    html += '<div class="loading">还没有任何内容</div>';
                } else {
                    allPosts.forEach(post => {
                        if (post.source === 'wall') {
                            // 校园墙帖子显示样式
                            html += `
                                <div class="feed-item" data-post-id="${post.id}" data-source="wall">
                                    <div class="item-header">
                                        <span class="item-author">${escapeHtml(post.extra.nickname)} <span class="source-tag">校园墙</span></span>
                                        <span class="item-time">${escapeHtml(post.time || '')}</span>
                                    </div>
                                    <div class="item-content">${escapeHtml(post.content || '').replace(/\n/g, '<br>')}</div>
                                    <div class="item-footer">
                                        <button class="stat-btn like-profile-btn" data-post-id="${post.id}" data-source="wall"><i class="fa-regular fa-heart"></i> ${post.likes}</button>
                                        ${isMine ? `
                                            <button class="delete-post" data-post-id="${post.id}" data-source="wall"><i class="fa-regular fa-trash-can"></i> 删除</button>
                                        ` : ''}
                                    </div>
                                </div>
                            `;
                        } else {
                            // 主页动态
                            html += `
                                <div class="feed-item" data-post-id="${post.id}" data-source="profile">
                                    <div class="item-header">
                                        <span class="item-author">${escapeHtml(profile.nickname || '匿名')} <span class="source-tag">主页动态</span></span>
                                        <span class="item-time">${escapeHtml(post.time || '')}</span>
                                    </div>
                                    <div class="item-content">${escapeHtml(post.content || '').replace(/\n/g, '<br>')}</div>
                                    <div class="item-footer">
                                        <button class="stat-btn like-profile-btn" data-post-id="${post.id}" data-source="profile"><i class="fa-regular fa-heart"></i> ${post.likes}</button>
                                        ${isMine ? `
                                            <button class="delete-post" data-post-id="${post.id}" data-source="profile"><i class="fa-regular fa-trash-can"></i> 删除</button>
                                        ` : ''}
                                    </div>
                                </div>
                            `;
                        }
                    });
                }
                html += '</div>';

                profileContent.innerHTML = html;

                // 保存资料
                if (isMine) {
                    document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
                        const nick = document.getElementById('profileNick').value.trim() || '匿名';
                        const bio = document.getElementById('profileBio').value.trim() || '';
                        appState.profiles[fingerprint].profile.nickname = nick;
                        appState.profiles[fingerprint].profile.bio = bio;
                        await saveData();
                        renderProfile(fingerprint);
                    });

                    document.getElementById('publishProfileBtn')?.addEventListener('click', async () => {
                        const content = document.getElementById('profilePostContent').value.trim();
                        if (!content) return alert('内容不能为空');
                        const newPost = {
                            id: Date.now() + '-' + Math.random().toString(36).substr(2, 6),
                            content: content,
                            time: new Date().toLocaleString('zh-CN', { hour12: false }),
                            likes: 0
                        };
                        appState.profiles[fingerprint].posts.unshift(newPost);
                        await saveData();
                        renderProfile(fingerprint);
                    });
                }

                // 点赞事件 (区分来源)
                document.querySelectorAll('#profilePostsFeed .like-profile-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const postId = btn.dataset.postId;
                        const source = btn.dataset.source;
                        if (source === 'wall') {
                            const post = appState.wallPosts.find(p => p.id === postId);
                            if (post) {
                                post.likes = (post.likes || 0) + 1;
                                await saveData();
                                renderProfile(fingerprint);
                                renderWallPosts(); // 同时更新校园墙视图
                            }
                        } else {
                            const post = appState.profiles[fingerprint].posts.find(p => p.id === postId);
                            if (post) {
                                post.likes = (post.likes || 0) + 1;
                                await saveData();
                                renderProfile(fingerprint);
                            }
                        }
                    });
                });

                // 删除事件
                document.querySelectorAll('#profilePostsFeed .delete-post').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const postId = btn.dataset.postId;
                        const source = btn.dataset.source;
                        if (source === 'wall') {
                            appState.deleteTarget = { source: 'wall', fingerprint: null, postId: postId };
                        } else {
                            appState.deleteTarget = { source: 'profile', fingerprint: fingerprint, postId: postId };
                        }
                        deletePass.value = '';
                        deleteDialog.classList.add('show');
                    });
                });
            }

            // 切换视图
            function setActiveView(view) {
                if (view === 'wall') {
                    wallView.classList.add('active');
                    profileView.classList.remove('active');
                    navWallBtn.classList.add('active');
                    navProfileBtn.classList.remove('active');
                    renderWallPosts(); // 刷新
                } else {
                    wallView.classList.remove('active');
                    profileView.classList.add('active');
                    navWallBtn.classList.remove('active');
                    navProfileBtn.classList.add('active');
                    // 如果当前查看的个人主页指纹不是自己的，可能需要在进入时重置为自己？这里保持原样
                    if (appState.viewingProfileFingerprint !== appState.myFingerprint) {
                        // 可以选择跳回自己主页或保持，这里保持
                    }
                    renderProfile(appState.viewingProfileFingerprint);
                }
            }

            // 校园墙发布
            async function publishWallPost() {
                const className = postClass.value.trim() || '未填班级';
                const nick = postNick.value.trim() || '匿名';
                const category = postCategory.value;
                const content = postContent.value.trim();
                if (!content) return alert('内容不能为空');

                const newPost = {
                    id: Date.now() + '-' + Math.random().toString(36).substr(2, 6),
                    fingerprint: appState.myFingerprint,
                    class: className,
                    nickname: nick,
                    category: category,
                    content: content,
                    time: new Date().toLocaleString('zh-CN', { hour12: false }),
                    likes: 0,
                    comments: []
                };
                appState.wallPosts.unshift(newPost);
                await saveData();
                postContent.value = '';
                charCount.textContent = '0/500';
                postClass.value = '';
                postNick.value = '';
                renderWallPosts();
                // 如果当前在个人主页且查看的是自己，刷新个人主页
                if (profileView.classList.contains('active') && appState.viewingProfileFingerprint === appState.myFingerprint) {
                    renderProfile(appState.myFingerprint);
                }
            }

            function escapeHtml(unsafe) {
                if (!unsafe) return unsafe;
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
                    return m;
                });
            }
        })();
    </script>
</body>
</html>
