<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上蔡县第二高级中学 · 校园墙</title>
    <!-- 圆润字体：Inter + 系统回退 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 全局变量 – 亮色模式 (默认) */
        :root {
            --bg-gradient-start: #f0f4fa;
            --bg-gradient-end: #d9e2ef;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --text-primary: #1e2b3c;
            --text-secondary: #3e5569;
            --text-tertiary: #6b7f94;
            --border-light: #d0deed;
            --accent: #2c4c6e;          /* 主色调 蓝灰 */
            --accent-soft: #e1ebf5;
            --card-shadow: 0 8px 20px -12px rgba(0,20,40,0.25);
            --tag-bg: #e6eef8;
            --tag-active: #2c4c6e;       /* 与accent联动 */
            --tag-active-text: white;
            --input-bg: #ffffff;
            --placeholder: #9aafc4;
            --delete-btn: #b55a5a;
            --delete-btn-hover: #a14242;
            --transition: 0.2s ease;
            --header-bg: #243b4f;
            --header-text: #ffffff;
        }

        /* 暗色模式 (保留独立配色) */
        body.dark {
            --bg-gradient-start: #1a262f;
            --bg-gradient-end: #0f1a24;
            --surface: rgba(25, 35, 45, 0.9);
            --surface-solid: #1f2e3a;
            --text-primary: #eaf0f8;
            --text-secondary: #c0d2e2;
            --text-tertiary: #9bb0c2;
            --border-light: #2f4255;
            --accent: #5b8cb0;            /* 暗色主色调 */
            --accent-soft: #253746;
            --card-shadow: 0 8px 20px -8px rgba(0,0,0,0.6);
            --tag-bg: #2d3f50;
            --tag-active: #5b8cb0;
            --tag-active-text: #0f1a24;
            --input-bg: #25323e;
            --placeholder: #728da5;
            --delete-btn: #c47a7a;
            --delete-btn-hover: #d68b8b;
            --header-bg: #0e1a24;
            --header-text: #eef5fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 1.5rem 1rem 3rem;
            display: flex;
            justify-content: center;
            color: var(--text-primary);
        }

        .wall-container {
            max-width: 820px;
            width: 100%;
        }

        /* 头部卡片 */
        .header-card {
            background: var(--header-bg);
            color: var(--header-text);
            border-radius: 2.5rem 2.5rem 1.8rem 1.8rem;
            padding: 2rem 2rem 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 16px 0 -4px rgba(0,0,0,0.2), var(--card-shadow);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .header-title small {
            font-size: 1rem;
            font-weight: 400;
            margin-left: 0.8rem;
            opacity: 0.8;
            letter-spacing: 0.4px;
        }

        .header-sub {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.8rem;
            font-weight: 400;
            color: rgba(255,255,255,0.8);
        }

        .theme-toggle {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 3rem;
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            backdrop-filter: blur(4px);
        }

        .theme-toggle i {
            font-size: 1rem;
        }

        /* 设置齿轮图标 */
        .settings-icon {
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
            font-size: 1.8rem;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: 0.2s;
        }
        .settings-icon:hover {
            color: white;
            transform: rotate(30deg);
        }

        /* 分类标签 */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .cat {
            background: var(--tag-bg);
            color: var(--text-secondary);
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.1s;
        }

        .cat.active {
            background: var(--tag-active);
            color: var(--tag-active-text);
            border-color: var(--accent);
        }

        /* 发布卡片 (移回上方，始终显示) */
        .post-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: 2.2rem;
            padding: 1.5rem 1.5rem 1.2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
        }

        .post-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-primary);
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .input-row input, .input-row select, .input-row textarea {
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 3rem;
            padding: 0.8rem 1.2rem;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
            flex: 1 1 auto;
        }

        .input-row input::placeholder, .input-row textarea::placeholder {
            color: var(--placeholder);
        }

        .input-row textarea {
            border-radius: 1.8rem;
            min-height: 80px;
            width: 100%;
            resize: vertical;
        }

        .publish-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            align-items: center;
        }

        .btn-primary {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.6rem 2rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #1a3349;
            transition: 0.1s;
            border: 1px solid rgba(255,255,255,0.2);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1a3349;
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 6px 0 #1a3349;
        }

        /* 帖子流 */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* 帖子淡入动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feed-item {
            background: var(--surface-solid);
            border-radius: 2rem;
            padding: 1.5rem 1.5rem 1rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            animation: fadeIn 0.3s ease-out;
        }

        .item-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
        }

        .badge-class {
            background: var(--accent-soft);
            color: var(--text-primary);
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-nick {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .badge-cat {
            background: var(--tag-bg);
            color: var(--text-secondary);
            padding: 0.2rem 0.9rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .item-time {
            margin-left: auto;
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        .item-content {
            font-size: 1rem;
            line-height: 1.5;
            padding: 0.4rem 0 0.8rem;
            color: var(--text-primary);
            white-space: pre-wrap;
        }

        .item-stats {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            border-top: 1px solid var(--border-light);
            padding-top: 0.7rem;
            margin-top: 0.3rem;
        }

        .stat-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--text-tertiary);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 2rem;
        }

        .stat-btn:hover {
            background: var(--accent-soft);
            color: var(--text-primary);
        }

        .stat-btn.liked {
            color: #e06767;
        }

        .delete-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--delete-btn);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
        }

        .delete-btn:hover {
            background: rgba(180, 90, 90, 0.15);
            color: var(--delete-btn-hover);
        }

        /* 评论区域 */
        .comments-section {
            margin-top: 1rem;
            background: var(--surface);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid var(--border-light);
        }

        .comment-item {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            padding: 0.5rem 0;
            border-bottom: 1px dashed var(--border-light);
        }

        .comment-meta {
            display: flex;
            gap: 0.5rem;
            align-items: baseline;
            font-size: 0.8rem;
        }

        .comment-nick {
            font-weight: 600;
            color: var(--text-secondary);
        }

        .comment-time {
            color: var(--text-tertiary);
            font-size: 0.65rem;
        }

        .comment-content {
            font-size: 0.9rem;
            color: var(--text-primary);
            padding-left: 0.5rem;
        }

        .add-comment {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .add-comment input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 3rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            color: var(--text-primary);
        }

        .add-comment button {
            background: var(--accent);
            border: none;
            color: white;
            border-radius: 3rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* 密码弹窗 */
        .delete-dialog {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .delete-dialog.show {
            visibility: visible;
            opacity: 1;
        }

        .dialog-box {
            background: var(--surface-solid);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 350px;
            width: 90%;
            border: 1px solid var(--border-light);
            box-shadow: 0 20px 30px -10px black;
        }

        .dialog-box p {
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .dialog-box input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            border: 1px solid var(--border-light);
            background: var(--input-bg);
            color: var(--text-primary);
            margin-bottom: 1.2rem;
        }

        .dialog-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
        }

        .dialog-actions button {
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            border: none;
            cursor: pointer;
        }

        .confirm-delete {
            background: var(--delete-btn);
            color: white;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-tertiary);
        }

        .footer-note {
            margin-top: 2.5rem;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.8rem;
        }

        /* 公告弹窗 */
        .announce-dialog {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .announce-dialog.show {
            visibility: visible;
            opacity: 1;
        }

        .announce-box {
            background: var(--surface-solid);
            border-radius: 2.5rem;
            padding: 2.2rem 2rem;
            max-width: 450px;
            width: 90%;
            border: 2px solid var(--accent);
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .announce-box p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .announce-box .signature {
            font-size: 1rem;
            color: var(--text-tertiary);
            border-top: 1px dashed var(--border-light);
            padding-top: 1rem;
            margin-bottom: 1.8rem;
            font-style: italic;
        }

        .announce-box button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.8rem 2.5rem;
            border-radius: 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 6px 0 #1a3349;
        }

        .announce-box button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1a3349;
        }

        /* ---------- 设置面板 (第二页) ---------- */
        .settings-panel {
            background: var(--surface-solid);
            border-radius: 2.5rem;
            padding: 2rem 1.8rem;
            margin-bottom: 2rem;
            border: 2px solid var(--accent);
            box-shadow: var(--card-shadow);
            display: none;  /* 默认隐藏 */
        }

        .settings-panel h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .color-options {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .color-btn {
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .color-btn:hover {
            transform: scale(1.1);
            border-color: var(--text-primary);
        }
        .color-btn.active {
            border-color: white;
            box-shadow: 0 0 0 2px var(--accent);
        }

        .admin-request {
            margin: 2rem 0;
            padding: 1.5rem 0;
            border-top: 2px dashed var(--border-light);
            border-bottom: 2px dashed var(--border-light);
        }

        .admin-request button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 1rem 2rem;
            border-radius: 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 0 #1a3349;
        }

        .back-btn {
            background: var(--text-tertiary);
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        /* 问答弹窗 (申请管理员) */
        .quiz-dialog {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2500;
            backdrop-filter: blur(5px);
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .quiz-dialog.show {
            visibility: visible;
            opacity: 1;
        }
        .quiz-box {
            background: var(--surface-solid);
            border-radius: 2.5rem;
            padding: 2rem;
            max-width: 380px;
            width: 90%;
            border: 2px solid var(--accent);
            text-align: center;
        }
        .quiz-box p {
            font-size: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .quiz-box input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            border: 1px solid var(--border-light);
            background: var(--input-bg);
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }
        .quiz-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .quiz-actions button {
            padding: 0.6rem 1.8rem;
            border-radius: 3rem;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .quiz-submit {
            background: var(--accent);
            color: white;
        }
    </style>
</head>
<body>
    <!-- 公告弹窗 -->
    <div class="announce-dialog" id="announceDialog">
        <div class="announce-box">
            <p>此内容通过 GitHub 发布，仅供娱乐使用，可随意发言，无违规词，但可通过管理员密码对于内容删除。</p>
            <div class="signature">—— 吞吞吐吐</div>
            <button id="confirmAnnounce">确认</button>
        </div>
    </div>

    <!-- 问答弹窗 (申请管理员) -->
    <div class="quiz-dialog" id="quizDialog">
        <div class="quiz-box">
            <p>🤔 吞吞吐吐是谁？</p>
            <input type="text" id="quizAnswer" placeholder="输入你的答案">
            <div class="quiz-actions">
                <button class="quiz-submit" id="submitQuiz">提交</button>
                <button id="cancelQuiz">取消</button>
            </div>
        </div>
    </div>

    <div class="wall-container">
        <!-- 头部 -->
        <div class="header-card">
            <div class="header-title">
                上蔡县第二高级中学 <small>SHANGCAI NO.2 HIGH SCHOOL</small>
            </div>
            <div class="header-sub">
                <span><i class="fas fa-leaf"></i> 匿名·真实班级·树洞</span>
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i> 暗色 / <i class="fas fa-sun"></i> 亮色
                </div>
            </div>
            <!-- 设置齿轮 -->
            <div class="settings-icon" id="settingsIcon">
                <i class="fas fa-cog"></i>
            </div>
        </div>

        <!-- 主界面内容 (分类、发布、帖子) 默认显示 -->
        <div id="mainContent">
            <!-- 分类筛选 -->
            <div class="categories" id="categoryFilter">
                <span class="cat active" data-cat="all">全部</span>
                <span class="cat" data-cat="表白墙">💌 表白墙</span>
                <span class="cat" data-cat="失物招领">🔍 失物招领</span>
                <span class="cat" data-cat="求助">🆘 求助</span>
                <span class="cat" data-cat="树洞">🌳 树洞</span>
                <span class="cat" data-cat="二手">📦 二手</span>
                <span class="cat" data-cat="其他">📌 其他</span>
            </div>

            <!-- 发布卡片 (固定在上方，始终可见) -->
            <div class="post-card">
                <h3><i class="fas fa-pen-fancy"></i> 发布新帖 · 匿名但留下班级与昵称</h3>
                <div class="input-row">
                    <input type="text" id="postClass" placeholder="班级 (自由输入, 如 高三14班)" value="">
                    <input type="text" id="postNick" placeholder="昵称 (如 小月亮)" value="">
                    <select id="postCategory">
                        <option value="表白墙">表白墙</option>
                        <option value="失物招领">失物招领</option>
                        <option value="求助">求助</option>
                        <option value="树洞">树洞</option>
                        <option value="二手">二手</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <textarea id="postContent" placeholder="说点什么吧…" rows="2"></textarea>
                <div class="publish-actions">
                    <span style="font-size:0.75rem; color:var(--text-tertiary);" id="charCount">0/500</span>
                    <button class="btn-primary" id="publishBtn">发布</button>
                </div>
            </div>

            <!-- 帖子列表容器 -->
            <div id="postsFeed" class="feed">
                <div class="loading"><i class="fas fa-spinner fa-pulse"></i> 加载帖子中...</div>
            </div>
        </div>

        <!-- 设置面板 (第二页) 初始隐藏 -->
        <div id="settingsPanel" class="settings-panel">
            <h2><i class="fas fa-palette"></i> 主题颜色</h2>
            <div class="color-options">
                <div class="color-btn" style="background: #f3c14b;" data-color="yellow" title="黄"></div>
                <div class="color-btn" style="background: #f28b8b;" data-color="pink" title="粉"></div>
                <div class="color-btn" style="background: #e15554;" data-color="red" title="红"></div>
                <div class="color-btn" style="background: #4c9ad9;" data-color="blue" title="蓝"></div>
                <div class="color-btn" style="background: #b98cd9;" data-color="purple" title="淡紫"></div>
            </div>

            <div class="admin-request">
                <button id="requestAdminBtn"><i class="fas fa-shield-alt"></i> 申请管理员密码</button>
            </div>

            <button class="back-btn" id="backToMainBtn"><i class="fas fa-arrow-left"></i> 返回主界面</button>
        </div>

        <div class="footer-note">
            ⚡ 数据存储在 JSONBin · 管理删除需密码
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="delete-dialog" id="deleteDialog">
        <div class="dialog-box">
            <p><i class="fas fa-trash-alt" style="color:var(--delete-btn);"></i> 输入管理密码以删除</p>
            <input type="password" id="deletePass" placeholder="密码">
            <div class="dialog-actions">
                <button id="cancelDelete">取消</button>
                <button class="confirm-delete" id="confirmDelete">确认删除</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== 你的 JSONBin 凭据 (已填入) ==========
            const JSONBIN_KEY = '$2a$10$9z248RcrjjqcUz1byk73Ie5SZ/L0FpjHdBDo6jBPxpwmCKc/qOeFi';  // Master Key
            const JSONBIN_BIN_ID = '69afdb8bef73d7764563db24';                               // Bin ID
            const ADMIN_PASS = 'admin123';                    // 管理删除密码 (可修改)
            // =================================================

            // 当前帖子数据
            let allPosts = [];           
            let currentCategory = 'all';
            let deleteTargetId = null;    

            // DOM元素
            const feedDiv = document.getElementById('postsFeed');
            const themeToggle = document.getElementById('themeToggle');
            const publishBtn = document.getElementById('publishBtn');
            const postClass = document.getElementById('postClass');
            const postNick = document.getElementById('postNick');
            const postCategory = document.getElementById('postCategory');
            const postContent = document.getElementById('postContent');
            const charCount = document.getElementById('charCount');
            const deleteDialog = document.getElementById('deleteDialog');
            const deletePass = document.getElementById('deletePass');
            const cancelDelete = document.getElementById('cancelDelete');
            const confirmDel = document.getElementById('confirmDelete');
            const categorySpans = document.querySelectorAll('.cat');
            const announceDialog = document.getElementById('announceDialog');
            const confirmAnnounce = document.getElementById('confirmAnnounce');
            // 设置相关
            const settingsIcon = document.getElementById('settingsIcon');
            const mainContent = document.getElementById('mainContent');
            const settingsPanel = document.getElementById('settingsPanel');
            const backToMainBtn = document.getElementById('backToMainBtn');
            const colorBtns = document.querySelectorAll('.color-btn');
            const requestAdminBtn = document.getElementById('requestAdminBtn');
            const quizDialog = document.getElementById('quizDialog');
            const quizAnswer = document.getElementById('quizAnswer');
            const submitQuiz = document.getElementById('submitQuiz');
            const cancelQuiz = document.getElementById('cancelQuiz');

            // 显示公告弹窗 (每次进入页面都显示)
            announceDialog.classList.add('show');

            confirmAnnounce.addEventListener('click', () => {
                announceDialog.classList.remove('show');
            });

            // 主题切换 (亮色/暗色)
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const icon = themeToggle.querySelector('i');
                if (document.body.classList.contains('dark')) {
                    icon.className = 'fas fa-sun';
                } else {
                    icon.className = 'fas fa-moon';
                }
            });

            // 字数统计
            postContent.addEventListener('input', () => {
                charCount.textContent = postContent.value.length + '/500';
            });

            // 分类点击
            categorySpans.forEach(span => {
                span.addEventListener('click', () => {
                    categorySpans.forEach(s => s.classList.remove('active'));
                    span.classList.add('active');
                    currentCategory = span.dataset.cat;
                    renderPosts();
                });
            });

            // 设置图标点击：显示设置面板，隐藏主内容
            settingsIcon.addEventListener('click', () => {
                mainContent.style.display = 'none';
                settingsPanel.style.display = 'block';
            });

            // 返回主界面
            backToMainBtn.addEventListener('click', () => {
                settingsPanel.style.display = 'none';
                mainContent.style.display = 'block';
            });

            // 主题色切换 (修改CSS变量)
            colorBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // 移除所有active类
                    colorBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const color = btn.dataset.color;
                    let accentColor, accentSoft, tagActive;
                    switch(color) {
                        case 'yellow':
                            accentColor = '#d9a404';
                            accentSoft = '#f9e6b3';
                            tagActive = '#d9a404';
                            break;
                        case 'pink':
                            accentColor = '#d96c8c';
                            accentSoft = '#fad4e1';
                            tagActive = '#d96c8c';
                            break;
                        case 'red':
                            accentColor = '#c0392b';
                            accentSoft = '#f5bcb6';
                            tagActive = '#c0392b';
                            break;
                        case 'blue':
                            accentColor = '#2980b9';
                            accentSoft = '#c6e2ff';
                            tagActive = '#2980b9';
                            break;
                        case 'purple':
                            accentColor = '#8e6bc4';
                            accentSoft = '#e3d5f5';
                            tagActive = '#8e6bc4';
                            break;
                        default: return;
                    }
                    // 修改根变量 (只改亮色模式，暗色模式保留原有)
                    document.documentElement.style.setProperty('--accent', accentColor);
                    document.documentElement.style.setProperty('--accent-soft', accentSoft);
                    document.documentElement.style.setProperty('--tag-active', tagActive);
                    // 同时修改按钮阴影等 (可选)
                });
            });

            // 申请管理员：弹出问答框
            requestAdminBtn.addEventListener('click', () => {
                quizDialog.classList.add('show');
                quizAnswer.value = '';
            });

            // 取消问答
            cancelQuiz.addEventListener('click', () => {
                quizDialog.classList.remove('show');
            });

            // 提交答案
            submitQuiz.addEventListener('click', () => {
                const answer = quizAnswer.value.trim();
                if (answer === '47') {
                    alert('✅ 管理员密码是：admin123');
                    quizDialog.classList.remove('show');
                } else {
                    alert('❌ 答案错误，再试试吧');
                }
            });

            // JSONBin 请求头
            function getHeaders() {
                return {
                    'Content-Type': 'application/json',
                    'X-Master-Key': JSONBIN_KEY,
                    'X-Bin-Meta': false,
                };
            }

            // 获取所有帖子
            async function fetchPosts() {
                if (!JSONBIN_BIN_ID || JSONBIN_BIN_ID === 'YOUR_BIN_ID') {
                    feedDiv.innerHTML = '<div class="loading" style="color:red;">请先在代码中填写正确的JSONBin Bin ID</div>';
                    return;
                }
                try {
                    feedDiv.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> 加载中...</div>';
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                        headers: getHeaders()
                    });
                    if (!response.ok) throw new Error('加载失败，请检查Key和Bin ID');
                    const data = await response.json();
                    if (data && Array.isArray(data.posts)) {
                        allPosts = data.posts;
                    } else if (Array.isArray(data)) {
                        allPosts = data;
                    } else {
                        allPosts = [];
                    }
                    renderPosts();
                } catch (e) {
                    feedDiv.innerHTML = `<div class="loading" style="color:red;">加载失败: ${e.message}</div>`;
                }
            }

            // 保存帖子到JSONBin (全量更新)
            async function savePosts() {
                if (!JSONBIN_BIN_ID || JSONBIN_BIN_ID === 'YOUR_BIN_ID') {
                    alert('请先在代码中填写正确的JSONBin Bin ID');
                    return;
                }
                try {
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                        method: 'PUT',
                        headers: getHeaders(),
                        body: JSON.stringify({ posts: allPosts })
                    });
                    if (!response.ok) throw new Error('保存失败');
                    renderPosts(); // 刷新显示
                } catch (e) {
                    alert('保存到JSONBin失败: ' + e.message);
                }
            }

            // 渲染帖子 (根据分类)
            function renderPosts() {
                if (!allPosts.length) {
                    feedDiv.innerHTML = '<div class="loading">✨ 还没有帖子，来发布第一条吧</div>';
                    return;
                }

                // 排序：按时间倒序
                const sorted = [...allPosts].sort((a, b) => (b.time || '').localeCompare(a.time || ''));

                const filtered = currentCategory === 'all' ? sorted : sorted.filter(p => p.category === currentCategory);

                if (filtered.length === 0) {
                    feedDiv.innerHTML = '<div class="loading">📭 这个分类暂时没有帖子</div>';
                    return;
                }

                let html = '';
                filtered.forEach(post => {
                    const comments = post.comments || [];
                    const commentCount = comments.length;

                    html += `
                        <div class="feed-item" data-id="${post.id}">
                            <div class="item-header">
                                <span class="badge-class">${escapeHtml(post.class || '未填班级')}</span>
                                <span class="badge-nick">${escapeHtml(post.nickname || '匿名')}</span>
                                <span class="badge-cat">${escapeHtml(post.category || '其他')}</span>
                                <span class="item-time">${escapeHtml(post.time || '')}</span>
                            </div>
                            <div class="item-content">${escapeHtml(post.content || '').replace(/\n/g, '<br>')}</div>
                            <div class="item-stats">
                                <button class="stat-btn like-btn" data-id="${post.id}"><i class="fa-regular fa-heart"></i> ${post.likes || 0}</button>
                                <button class="stat-btn comment-toggle" data-id="${post.id}"><i class="fa-regular fa-comment"></i> ${commentCount}</button>
                                <button class="delete-btn" data-id="${post.id}"><i class="fa-regular fa-trash-can"></i> 删除</button>
                            </div>
                            <div class="comments-section" id="comments-${post.id}" style="display: none;">
                                ${comments.map(c => `
                                    <div class="comment-item">
                                        <div class="comment-meta">
                                            <span class="comment-nick">${escapeHtml(c.nickname || '匿名')}</span>
                                            <span class="comment-time">${escapeHtml(c.time || '')}</span>
                                        </div>
                                        <div class="comment-content">${escapeHtml(c.content || '')}</div>
                                    </div>
                                `).join('')}
                                <div class="add-comment">
                                    <input type="text" placeholder="你的昵称" class="comment-nick-input" id="nick-${post.id}">
                                    <input type="text" placeholder="评论内容" class="comment-text-input" id="text-${post.id}">
                                    <button class="add-comment-btn" data-id="${post.id}">发送</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                feedDiv.innerHTML = html;

                // 绑定点赞、评论显示、删除、添加评论事件
                document.querySelectorAll('.like-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        const post = allPosts.find(p => p.id === id);
                        if (post) {
                            post.likes = (post.likes || 0) + 1;
                            await savePosts();
                        }
                    });
                });

                document.querySelectorAll('.comment-toggle').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.id;
                        const section = document.getElementById(`comments-${id}`);
                        if (section) section.style.display = section.style.display === 'none' ? 'block' : 'none';
                    });
                });

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteTargetId = btn.dataset.id;
                        deletePass.value = '';
                        deleteDialog.classList.add('show');
                    });
                });

                document.querySelectorAll('.add-comment-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.dataset.id;
                        const nickInput = document.getElementById(`nick-${id}`);
                        const textInput = document.getElementById(`text-${id}`);
                        const nick = nickInput.value.trim() || '匿名';
                        const text = textInput.value.trim();
                        if (!text) return;
                        const post = allPosts.find(p => p.id === id);
                        if (post) {
                            if (!post.comments) post.comments = [];
                            post.comments.push({
                                nickname: nick,
                                content: text,
                                time: new Date().toLocaleString('zh-CN', { hour12: false })
                            });
                            textInput.value = '';
                            nickInput.value = '';
                            await savePosts();
                        }
                    });
                });
            }

            // 简单防XSS
            function escapeHtml(unsafe) {
                if (!unsafe) return unsafe;
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
                    return m;
                });
            }

            // 发布新帖 (带按钮动画)
            publishBtn.addEventListener('click', async () => {
                const className = postClass.value.trim() || '未填班级';
                const nick = postNick.value.trim() || '匿名';
                const category = postCategory.value;
                const content = postContent.value.trim();
                if (!content) return alert('内容不能为空');

                // 按钮加载状态
                const originalText = publishBtn.innerHTML;
                publishBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 发布中...';
                publishBtn.disabled = true;

                const newPost = {
                    id: Date.now() + '-' + Math.random().toString(36).substr(2, 6),
                    class: className,
                    nickname: nick,
                    category: category,
                    content: content,
                    time: new Date().toLocaleString('zh-CN', { hour12: false }),
                    likes: 0,
                    comments: []
                };
                allPosts.unshift(newPost);
                try {
                    await savePosts();  // 保存并重新渲染
                    postContent.value = '';
                    charCount.textContent = '0/500';
                    postClass.value = '';
                    postNick.value = '';
                } catch (e) {
                    alert('发布失败');
                } finally {
                    // 恢复按钮
                    publishBtn.innerHTML = originalText;
                    publishBtn.disabled = false;
                }
            });

            // 删除确认
            cancelDelete.addEventListener('click', () => {
                deleteDialog.classList.remove('show');
                deleteTargetId = null;
            });

            confirmDel.addEventListener('click', async () => {
                const inputPass = deletePass.value.trim();
                if (inputPass !== ADMIN_PASS) {
                    alert('密码错误');
                    return;
                }
                if (deleteTargetId) {
                    allPosts = allPosts.filter(p => p.id !== deleteTargetId);
                    await savePosts();
                    deleteDialog.classList.remove('show');
                    deleteTargetId = null;
                }
            });

            // 初始化获取数据
            if (JSONBIN_BIN_ID && JSONBIN_BIN_ID !== 'YOUR_BIN_ID') {
                fetchPosts();
            } else {
                feedDiv.innerHTML = '<div class="loading">🔧 请先在代码开头填写你的JSONBin Bin ID和Key</div>';
            }
        })();
    </script>
</body>
</html>
