<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>上蔡二高 · 校园墙 </title>
    <!-- 系统字体，无外部依赖 -->
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-start: #f0f4fa;
            --bg-end: #d9e2ef;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --text-primary: #1e2b3c;
            --text-secondary: #3e5569;
            --text-tertiary: #6b7f94;
            --border-light: #d0deed;
            --accent: #2c4c6e;
            --accent-soft: #e1ebf5;
            --card-shadow: 0 10px 30px -8px rgba(0,20,40,0.2);
            --tag-bg: #e6eef8;
            --input-bg: #ffffff;
            --delete-btn: #b55a5a;
            --header-bg: #243b4f;
            --header-text: #ffffff;
            --sidebar-bg: #ffffff;
            --sidebar-text: #1e2b3c;
            --overlay-bg: rgba(0,0,0,0.3);
            --hitokoto-bg: var(--surface-solid);
        }

        body.dark {
            --bg-start: #1a262f;
            --bg-end: #0f1a24;
            --surface: rgba(25,35,45,0.9);
            --surface-solid: #1f2e3a;
            --text-primary: #eaf0f8;
            --text-secondary: #c0d2e2;
            --text-tertiary: #9bb0c2;
            --border-light: #2f4255;
            --accent: #5b8cb0;
            --accent-soft: #253746;
            --card-shadow: 0 10px 30px -8px rgba(0,0,0,0.6);
            --tag-bg: #2d3f50;
            --input-bg: #25323e;
            --delete-btn: #c47a7a;
            --header-bg: #0e1a24;
            --header-text: #eef5fc;
            --sidebar-bg: #1f2e3a;
            --sidebar-text: #eaf0f8;
            --overlay-bg: rgba(0,0,0,0.6);
            --hitokoto-bg: var(--surface-solid);
        }

        body {
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            min-height: 100vh;
            padding: 1.5rem 1rem 6rem;
            display: flex;
            justify-content: center;
            color: var(--text-primary);
            -webkit-overflow-scrolling: touch;
            transition: background 0.3s, color 0.2s;
        }

        .container {
            max-width: 820px;
            width: 100%;
            position: relative;
        }

        .header-card {
            background: var(--header-bg);
            color: var(--header-text);
            border-radius: 2.5rem 2.5rem 1.8rem 1.8rem;
            padding: 1.5rem 2rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 16px 0 -4px rgba(0,0,0,0.2), var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
            transition: background 0.3s;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .menu-icon {
            font-size: 1.8rem;
            cursor: pointer;
            color: white;
            transition: transform 0.2s;
        }

        .header-title {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            backdrop-filter: blur(3px);
            z-index: 999;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .sidebar-overlay.show { visibility: visible; opacity: 1; }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: var(--sidebar-bg);
            box-shadow: 2px 0 20px rgba(0,0,0,0.3);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s ease, background 0.3s;
            display: flex;
            flex-direction: column;
            padding: 2rem 1.2rem;
            border-right: 2px solid var(--accent);
            color: var(--sidebar-text);
            overflow-y: auto;
        }
        .sidebar.open { transform: translateX(0); }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-light);
        }
        .sidebar-avatar { font-size: 3rem; color: var(--accent); }
        .sidebar-user h4 { font-size: 1.1rem; margin-bottom: 0.2rem; }
        .sidebar-user p { font-size: 0.7rem; opacity: 0.8; }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            background: var(--accent-soft);
            border-radius: 2rem;
            cursor: pointer;
            border: 1px solid var(--border-light);
            transition: 0.2s;
            color: var(--text-primary);
        }
        .sidebar-item:hover { background: var(--accent); color: white; }

        .fun-section {
            background: var(--accent-soft);
            border-radius: 2rem;
            padding: 1.2rem;
            margin-top: auto;
            border: 1px solid var(--border-light);
        }
        .fun-title { font-weight: 600; margin-bottom: 0.8rem; display: flex; gap: 0.5rem; }
        .fun-content {
            font-size: 0.9rem;
            background: var(--surface-solid);
            padding: 0.8rem;
            border-radius: 1.5rem;
            min-height: 60px;
        }
        .fun-refresh { margin-top: 0.5rem; text-align: right; }
        .fun-refresh i {
            cursor: pointer;
            padding: 0.3rem;
            border-radius: 50%;
            background: var(--accent);
            color: white;
        }
        .sidebar-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-tertiary);
        }

        .view { display: none; }
        .view.active { display: block; }

        .announcement-bar {
            background: var(--accent-soft);
            border-radius: 3rem;
            padding: 1rem 1.8rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 1rem;
            backdrop-filter: blur(10px);
        }

        .hitokoto-card {
            background: var(--hitokoto-bg);
            border-radius: 3rem;
            padding: 0.9rem 1.8rem;
            margin-bottom: 1.8rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            text-align: center;
            font-size: 1rem;
            font-style: italic;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: fit-content;
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 5;
        }
        .cat {
            background: var(--tag-bg);
            color: var(--text-secondary);
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background 0.2s;
        }
        .cat.active { background: var(--accent); color: white; }

        .post-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: 2.5rem;
            padding: 1.5rem 1.5rem 1.2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            position: relative;
            z-index: 4;
            transition: background 0.3s;
        }
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .input-row input, .input-row select, .input-row textarea {
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 3rem;
            padding: 0.8rem 1.2rem;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
            flex: 1 1 auto;
            transition: background 0.3s;
        }
        .input-row textarea { border-radius: 1.8rem; min-height: 80px; resize: vertical; }
        .publish-actions { display: flex; justify-content: flex-end; gap: 1rem; align-items: center; }
        .btn-primary {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.6rem 2rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #1a3349;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-primary:active { transform: translateY(4px); box-shadow: 0 2px 0 #1a3349; }

        /* 卡片列表容器 - 使用contain优化性能 */
        .feed {
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 1rem 0 20vh;
            min-height: 70vh;
            contain: content;
        }

        /* 卡片基础样式 - 不设置z-index，保持自然堆叠顺序 */
        .feed-item {
            position: relative;
            background: var(--surface-solid);
            border-radius: 2.5rem;
            padding: 1.5rem 1.5rem 1rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            transition: transform 0.2s cubic-bezier(0.23, 1, 0.32, 1), 
                        margin-bottom 0.2s ease,
                        opacity 0.2s ease,
                        filter 0.2s ease,
                        background 0.3s;
            will-change: transform, margin-bottom, opacity, filter;
            transform-origin: center;
            margin-bottom: -30px; /* 基础重叠，会被JS动态覆盖 */
            width: 100%;
            backdrop-filter: blur(2px);
            opacity: 0.9;
            filter: blur(0.3px);
            /* 硬件加速 */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 焦点卡片样式 - 只改变视觉属性，不改变堆叠顺序 */
        .feed-item.focused {
            opacity: 1;
            filter: blur(0px);
            box-shadow: 0 30px 50px -15px rgba(0,0,0,0.3);
            border: 1px solid var(--accent);
            /* 注意：没有设置z-index，保持自然堆叠 */
        }

        /* 非焦点卡片内容截断 */
        .feed-item:not(.focused) .item-content {
            max-height: 4.5em;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, black 70%, transparent);
        }

        .feed-item:not(.focused) .comments-section { display: none !important; }

        .item-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
        }
        .badge-class {
            background: var(--accent-soft);
            color: var(--text-primary);
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .badge-nick {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
        }
        .badge-cat {
            background: var(--tag-bg);
            color: var(--text-secondary);
            padding: 0.2rem 0.9rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .item-time {
            margin-left: auto;
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }
        .item-content {
            font-size: 1rem;
            line-height: 1.5;
            padding: 0.4rem 0 0.8rem;
            white-space: pre-wrap;
        }
        .item-stats {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            border-top: 1px solid var(--border-light);
            padding-top: 0.7rem;
            margin-top: 0.3rem;
            flex-wrap: wrap;
        }
        .stat-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--text-tertiary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .stat-btn:active { transform: scale(0.95); }
        .delete-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--delete-btn);
            cursor: pointer;
            font-size: 0.85rem;
        }
        .post-fingerprint {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            background: var(--accent-soft);
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            margin-left: 0.5rem;
            cursor: help;
            font-family: monospace;
            font-weight: 600;
        }

        .comments-section {
            margin-top: 1rem;
            background: var(--surface);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid var(--border-light);
        }
        .add-comment {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .add-comment input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 3rem;
            padding: 0.5rem 1rem;
        }

        .identity-card, .profile-card, .lookup-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            transition: background 0.3s;
        }

        .dialog {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .dialog.show { visibility: visible; opacity: 1; }
        .dialog-box {
            background: var(--surface-solid);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 350px;
            width: 90%;
            border: 2px solid var(--accent);
        }
        .dialog-box input, .dialog-box textarea {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            border: 1px solid var(--border-light);
            background: var(--input-bg);
            color: var(--text-primary);
            margin: 1rem 0;
        }
        .dialog-actions { display: flex; justify-content: flex-end; gap: 0.8rem; }
        .dialog-actions button {
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            border: none;
            cursor: pointer;
            background: var(--accent);
            color: white;
        }
        #cancelDelete { background: var(--text-tertiary); }
        .loading { text-align: center; padding: 2rem; color: var(--text-tertiary); }
    </style>
    <!-- UA Parser (国内CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/ua-parser-js@1.0.35/dist/ua-parser.min.js"></script>
    <!-- Font Awesome 6 (BootCDN) -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header-card">
            <div class="header-left">
                <i class="fas fa-bars menu-icon" id="menuIcon"></i>
                <span class="header-title">上蔡二高</span>
            </div>
        </div>

        <!-- 侧边栏遮罩 -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- 侧边栏 -->
        <div class="sidebar" id="sidebar">
            <i class="fas fa-times sidebar-close" id="closeSidebar"></i>
            <div class="sidebar-header">
                <div class="sidebar-avatar"><i class="fas fa-user-circle"></i></div>
                <div class="sidebar-user">
                    <h4 id="sidebarNickname">加载中...</h4>
                    <p id="sidebarShortId">ID: 加载中...</p>
                </div>
            </div>
            <div class="sidebar-menu">
                <div class="sidebar-item" id="sidebarProfileBtn"><i class="fas fa-home"></i><span>我的主页</span></div>
                <div class="sidebar-item" id="sidebarThemeToggle"><i class="fas fa-moon" id="sidebarThemeIcon"></i><span>暗色模式</span></div>
                <div class="sidebar-item" id="sidebarMagicBtn"><i class="fas fa-magic"></i><span>神奇换色</span></div>
            </div>
            <div class="fun-section">
                <div class="fun-title"><i class="fas fa-grin-squint"></i> 喵呜T^T</div>
                <div class="fun-content" id="funContent">点击刷新获取今日份快乐喵(>^ω^<)~</div>
                <div class="fun-refresh"><i class="fas fa-sync-alt" id="refreshFun"></i></div>
            </div>
        </div>

        <!-- 公告栏 -->
        <div id="announcementBar" class="announcement-bar" style="display: none;">
            <i class="fas fa-bullhorn"></i>
            <span class="announcement-text" id="announcementText"></span>
        </div>

        <!-- 一言卡片 -->
        <div class="hitokoto-card" id="hitokotoContainer">
            <i class="fas fa-quote-right"></i>
            <span class="hitokoto-text" id="hitokotoText">加载一句一言...</span>
        </div>

        <!-- 校园墙视图 -->
        <div id="wallView" class="view active">
            <div class="categories" id="categoryFilter">
                <span class="cat active" data-cat="all">全部</span>
                <span class="cat" data-cat="表白墙">💌 表白墙</span>
                <span class="cat" data-cat="失物招领">🔍 失物招领</span>
                <span class="cat" data-cat="求助">🆘 求助</span>
                <span class="cat" data-cat="树洞">🌳 树洞</span>
                <span class="cat" data-cat="二手">📦 二手</span>
                <span class="cat" data-cat="其他">📌 其他</span>
            </div>

            <div class="post-card">
                <h3><i class="fas fa-pen-fancy"></i> 发布新帖</h3>
                <div class="input-row">
                    <input type="text" id="postClass" placeholder="班级 (如 高三14班)">
                    <input type="text" id="postNick" placeholder="昵称 (如 小月亮)">
                    <select id="postCategory">
                        <option value="表白墙">表白墙</option>
                        <option value="失物招领">失物招领</option>
                        <option value="求助">求助</option>
                        <option value="树洞">树洞</option>
                        <option value="二手">二手</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <textarea id="postContent" placeholder="说点什么吧…" rows="2"></textarea>
                <div class="publish-actions">
                    <span id="charCount">0/500</span>
                    <button class="btn-primary" id="publishWallBtn">发布</button>
                </div>
            </div>

            <div id="wallFeed" class="feed">
                <div class="loading"><i class="fas fa-spinner fa-pulse"></i> 等下喵(* >ω<）...</div>
            </div>
        </div>

        <!-- 个人主页视图 -->
        <div id="profileView" class="view">
            <div class="identity-card">
                <div class="identity-row" style="display: flex; align-items: center; gap: 1rem;">
                    <div class="device-icon"><i class="fas fa-mobile-alt"></i></div>
                    <div>
                        <div class="device-model" id="profileDeviceModel">识别设备...</div>
                        <div class="device-fingerprint" id="profileShortId">5位ID: 加载中...</div>
                    </div>
                </div>
            </div>
            <div class="lookup-card">
                <input type="text" id="lookupShortId" placeholder="输入5位数字ID查看主页">
                <button id="lookupProfileBtn"><i class="fas fa-search"></i> 查看</button>
            </div>
            <div id="profileContent"></div>
        </div>

        <!-- 删除确认弹窗 -->
        <div class="dialog" id="deleteDialog">
            <div class="dialog-box">
                <p><i class="fas fa-trash-alt" style="color:var(--delete-btn);"></i> 输入管理密码以删除</p>
                <input type="password" id="deletePass" placeholder="密码">
                <div class="dialog-actions">
                    <button id="cancelDelete">取消</button>
                    <button id="confirmDelete">确认删除</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== 配置 ==========
            const JSONBIN_KEY = '$2a$10$9z248RcrjjqcUz1byk73Ie5SZ/L0FpjHdBDo6jBPxpwmCKc/qOeFi';
            const JSONBIN_BIN_ID = '69afdb8bef73d7764563db24';
            const ADMIN_PASS = 'admin123';
            const STORAGE_KEY = 'sgep_backup';
            const STORAGE_KEY_LAST = 'sgep_last_good';
            const ID_CACHE_KEY = 'stable_device_id_cache';

            // ========== 基于 Web Crypto + 硬件信息生成稳定5位ID ==========
            async function generateStableDeviceId() {
                // 1. 先检查本地缓存 (优先使用，确保稳定性)
                try {
                    const cached = localStorage.getItem(ID_CACHE_KEY);
                    if (cached) {
                        const { id, timestamp } = JSON.parse(cached);
                        // 缓存有效期30天
                        if (Date.now() - timestamp < 30 * 24 * 60 * 60 * 1000) {
                            return id;
                        }
                    }
                } catch (e) {}

                // 2. 收集稳定的硬件和系统信息
                const parser = new UAParser();
                const ua = parser.getResult();
                
                // 核心硬件信息 (非常稳定)
                const features = [
                    navigator.hardwareConcurrency || 'unknown',           // CPU核心数
                    navigator.deviceMemory || 'unknown',                  // 设备内存(GB)
                    screen.colorDepth || 'unknown',                       // 色深
                    screen.width,                                          // 屏幕宽度
                    screen.height,                                         // 屏幕高度
                    navigator.language || 'unknown',                      // 系统语言
                    ua.os.name || 'unknown',                              // 操作系统
                    ua.device.model || ua.os.name || 'unknown',           // 设备型号
                    navigator.platform || 'unknown'                       // 平台
                ].join('|');

                // 3. 使用 Web Crypto API 生成 SHA-256 哈希
                const encoder = new TextEncoder();
                const data = encoder.encode(features);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = new Uint8Array(hashBuffer);
                
                // 4. 转换为5位数字 (10000-99999)
                // 取前4个字节(32位)转成整数
                let intVal = 0;
                for (let i = 0; i < 4; i++) {
                    intVal = (intVal << 8) + hashArray[i];
                }
                // 取绝对值并映射到目标范围
                const fiveDigitId = 10000 + (Math.abs(intVal) % 90000);
                
                // 5. 缓存到本地
                try {
                    localStorage.setItem(ID_CACHE_KEY, JSON.stringify({
                        id: fiveDigitId,
                        timestamp: Date.now()
                    }));
                } catch (e) {}
                
                return fiveDigitId;
            }

            // ========== 5位数字ID生成器 (使用硬件特征) ==========
            class ShortIdGenerator {
                constructor() {
                    this.idMap = {};      // 设备特征 -> 5位数字
                    this.reverseMap = {};  // 5位数字 -> 设备特征
                    this.usedIds = new Set();
                }

                loadFromProfiles(profiles) {
                    this.idMap = {};
                    this.reverseMap = {};
                    this.usedIds.clear();
                    for (let fingerprint in profiles) {
                        const profile = profiles[fingerprint];
                        if (profile && profile.shortId) {
                            const shortId = profile.shortId;
                            this.idMap[fingerprint] = shortId;
                            this.reverseMap[shortId] = fingerprint;
                            this.usedIds.add(shortId);
                        }
                    }
                }

                loadFromLocal() {
                    try {
                        const map = JSON.parse(localStorage.getItem('shortIdMap') || '{}');
                        for (let fingerprint in map) {
                            const shortId = map[fingerprint];
                            if (!this.idMap[fingerprint] && shortId) {
                                this.idMap[fingerprint] = shortId;
                                this.reverseMap[shortId] = fingerprint;
                                this.usedIds.add(shortId);
                            }
                        }
                    } catch (e) {}
                }

                saveToLocal(fingerprint, shortId) {
                    try {
                        let map = JSON.parse(localStorage.getItem('shortIdMap') || '{}');
                        map[fingerprint] = shortId;
                        localStorage.setItem('shortIdMap', JSON.stringify(map));
                    } catch (e) {}
                }

                async getOrCreateShortId(fingerprint, profiles) {
                    this.loadFromProfiles(profiles);
                    this.loadFromLocal();

                    if (this.idMap[fingerprint]) {
                        return this.idMap[fingerprint];
                    }

                    // 生成稳定的候选ID (使用硬件特征)
                    const candidate = await generateStableDeviceId();

                    // 冲突检测 (理论上概率极低，但保留)
                    let finalId = candidate;
                    while (this.reverseMap[finalId] && this.reverseMap[finalId] !== fingerprint) {
                        finalId++;
                        if (finalId > 99999) finalId = 10000;
                    }

                    this.idMap[fingerprint] = finalId;
                    this.reverseMap[finalId] = fingerprint;
                    this.usedIds.add(finalId);
                    this.saveToLocal(fingerprint, finalId);
                    return finalId;
                }

                getLongIdByShort(shortId) {
                    return this.reverseMap[shortId] || null;
                }
            }

            function generateHarmoniousPalette() {
                const hue = Math.floor(Math.random() * 360);
                // 生成柔和卡片背景色 (与主色相协调) - 饱和度低，亮度高，形成淡色
                const cardHue = (hue + 30) % 360; // 略微偏移，避免过于单调
                const cardBg = `hsl(${cardHue}, 15%, 95%)`; // 亮色模式卡片背景：低饱和高亮

                // 输入框背景略微深一点
                const inputBg = `hsl(${cardHue}, 10%, 98%)`;
                // 标签背景色
                const tagBg = `hsl(${hue}, 15%, 92%)`;
                
                return {
                    '--accent': `hsl(${hue}, 70%, 45%)`,
                    '--accent-soft': `hsl(${hue}, 20%, 90%)`,
                    '--bg-start': `hsl(${hue}, 30%, 92%)`,
                    '--bg-end': `hsl(${(hue + 20) % 360}, 25%, 82%)`,
                    '--header-bg': `hsl(${hue}, 40%, 25%)`,
                    '--delete-btn': `hsl(${(hue + 180) % 360}, 60%, 60%)`,
                    '--surface-solid': cardBg,
                    '--input-bg': inputBg,
                    '--tag-bg': tagBg,
                };
            }

            // ========== 优化的卡片堆叠效果 (保持自然Z轴顺序，但通过固定z-index实现顶部覆盖) ==========
            let rafId = null;
            let lastUpdate = 0;
            const UPDATE_INTERVAL = 16; // 约60fps

            function updateCardStack() {
                const cards = document.querySelectorAll('.feed-item');
                if (!cards.length) return;
                
                const viewportCenter = window.innerHeight / 2 + window.scrollY;
                const maxDistance = window.innerHeight * 0.7;
                
                // 先移除焦点类
                cards.forEach(c => c.classList.remove('focused'));
                
                // 找到最接近中心的卡片
                let closest = null;
                let closestDist = Infinity;
                cards.forEach(c => {
                    const rect = c.getBoundingClientRect();
                    const center = rect.top + window.scrollY + rect.height/2;
                    const dist = Math.abs(center - viewportCenter);
                    if (dist < closestDist) { closestDist = dist; closest = c; }
                });

                // 批量更新卡片样式 - 只调整重叠程度和透明度，不改变z-index (z-index已在渲染时固定)
                cards.forEach(c => {
                    const rect = c.getBoundingClientRect();
                    const center = rect.top + window.scrollY + rect.height/2;
                    const dist = Math.abs(center - viewportCenter);
                    
                    // 计算距离比例 (0-1)
                    const ratio = Math.min(1, dist / maxDistance);
                    
                    // 标记焦点卡片 (用于视觉高亮，但不改变Z轴)
                    if (c === closest) { 
                        c.classList.add('focused');
                    }
                    
                    // 只调整margin-bottom来控制重叠程度
                    // 焦点卡片重叠20px，边缘卡片重叠80px
                    const overlap = 20 + 60 * ratio;
                    c.style.marginBottom = `-${overlap}px`;
                    
                    // 微调透明度增加景深感
                    c.style.opacity = 0.85 + (1 - ratio) * 0.15;
                    
                    // 增强非聚焦卡片的模糊效果：最大模糊从1.2px提高到2.5px
                    const blur = ratio * 2.5;
                    c.style.filter = `blur(${blur}px)`;
                    
                    // 注意：没有设置transform和z-index，保持自然堆叠
                });
            }

            // 优化的滚动处理函数
            function handleScroll() {
                const now = performance.now();
                if (!rafId && now - lastUpdate > UPDATE_INTERVAL) {
                    rafId = requestAnimationFrame(() => {
                        updateCardStack();
                        lastUpdate = performance.now();
                        rafId = null;
                    });
                }
            }

            // 使用 passive 提升滚动性能
            window.addEventListener('scroll', handleScroll, { passive: true });
            window.addEventListener('resize', () => {
                if (rafId) cancelAnimationFrame(rafId);
                rafId = requestAnimationFrame(() => {
                    updateCardStack();
                    rafId = null;
                });
            });

                        appState.profiles[fingerprint].posts.unshift(newPost);
                        await saveData();
                        renderProfile(fingerprint);
                    });
                }
                document.querySelectorAll('.like-profile-btn').forEach(btn => {
                    btn.addEventListener('click', async e => {
                        e.stopPropagation();
                        const id = btn.dataset.id, src = btn.dataset.source;
                        if (src === 'wall') {
                            const post = appState.wallPosts.find(p => p.id === id);
                            if (post) { post.likes = (post.likes||0)+1; await saveData(); renderProfile(fingerprint); renderWallPosts(); }
                        } else {
                            const post = appState.profiles[fingerprint].posts.find(p => p.id === id);
                            if (post) { post.likes = (post.likes||0)+1; await saveData(); renderProfile(fingerprint); }
                        }
                    });
                });
                document.querySelectorAll('.delete-post').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.id, src = btn.dataset.source;
                        appState.deleteTarget = { source: src, shortId: src==='wall'?null:appState.myShortId, postId: id };
                        deletePass.value = '';
                        deleteDialog.classList.add('show');
                    });
                });
            }

            function setActiveView(view) {
                if (view === 'wall') { wallView.classList.add('active'); profileView.classList.remove('active'); }
                else { wallView.classList.remove('active'); profileView.classList.add('active'); }
            }

            async function publishWallPost() {
                const className = postClass.value.trim() || '未填班级';
                const nick = postNick.value.trim() || '匿名';
                const category = postCategory.value;
                const content = postContent.value.trim();
                if (!content) return alert('内容不能为空');
                const newPost = {
                    id: Date.now() + '-' + Math.random().toString(36).substr(2,6),
                    fingerprint: appState.myFingerprint,
                    class: className,
                    nickname: nick,
                    category: category,
                    content: content,
                    time: new Date().toLocaleString('zh-CN', { hour12: false }),
                    likes: 0,
                    comments: []
                };
                // 新帖插入到最前面
                appState.wallPosts.unshift(newPost);
                await saveData();
                postContent.value = ''; charCount.textContent = '0/500'; postClass.value = ''; postNick.value = '';
                renderWallPosts();
                if (profileView.classList.contains('active') && appState.viewingProfileShortId === appState.myShortId) renderProfile(appState.myFingerprint);
            }

            function escapeHtml(unsafe) {
                if (!unsafe) return unsafe;
                return unsafe.replace(/[&<>"]/g, m => {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            // ========== 初始化 ==========
            (async function init() {
                // 解析设备信息
                const parser = new UAParser();
                const ua = parser.getResult();
                appState.myDeviceInfo = {
                    model: ua.device.model || '未知设备',
                    os: ua.os.name || '未知系统',
                    browser: ua.browser.name || '未知浏览器'
                };
                profileDeviceModel.textContent = `${appState.myDeviceInfo.model} · ${appState.myDeviceInfo.os}`;

                // 生成稳定的设备特征字符串 (用于映射)
                const features = [
                    navigator.hardwareConcurrency || 'unknown',
                    navigator.deviceMemory || 'unknown',
                    screen.colorDepth || 'unknown',
                    screen.width,
                    screen.height,
                    navigator.language || 'unknown',
                    ua.os.name || 'unknown',
                    ua.device.model || ua.os.name || 'unknown',
                    navigator.platform || 'unknown'
                ].join('|');
                appState.myFingerprint = features;

                // 加载数据
                await loadData();

                // 获取或创建5位ID (使用硬件特征)
                appState.myShortId = await shortIdGen.getOrCreateShortId(appState.myFingerprint, appState.profiles);
                if (!appState.profiles[appState.myFingerprint]) {
                    appState.profiles[appState.myFingerprint] = {
                        shortId: appState.myShortId,
                        profile: { nickname: `同学${appState.myShortId}`, bio: '' },
                        posts: []
                    };
                } else {
                    appState.profiles[appState.myFingerprint].shortId = appState.myShortId;
                }
                await saveData();

                profileShortIdSpan.textContent = `5位ID: ${appState.myShortId}`;
                sidebarShortIdSpan.textContent = `ID: ${appState.myShortId}`;
                sidebarNickname.textContent = appState.profiles[appState.myFingerprint].profile.nickname;
                appState.viewingProfileShortId = appState.myShortId;

                updateHitokoto();
                updateFunContent();
                updateAnnouncementBar();
                renderWallPosts();

                categorySpans.forEach(s => {
                    s.addEventListener('click', () => {
                        categorySpans.forEach(c => c.classList.remove('active'));
                        s.classList.add('active');
                        appState.currentWallCategory = s.dataset.cat;
                        renderWallPosts();
                    });
                });

                publishWallBtn.addEventListener('click', publishWallPost);
                postContent.addEventListener('input', () => { charCount.textContent = postContent.value.length + '/500'; });

                lookupProfileBtn.addEventListener('click', async () => {
                    const short = lookupShortId.value.trim();
                    if (!short || !/^\d{5}$/.test(short)) { alert('请输入5位数字ID'); return; }
                    await loadData();
                    const fingerprint = shortIdGen.getLongIdByShort(parseInt(short));
                    if (!fingerprint || !appState.profiles[fingerprint]) { alert('该ID不存在'); return; }
                    appState.viewingProfileShortId = short;
                    renderProfile(fingerprint);
                    setActiveView('profile');
                });

                cancelDelete.addEventListener('click', () => deleteDialog.classList.remove('show'));
                confirmDel.addEventListener('click', async () => {
                    if (deletePass.value.trim() !== ADMIN_PASS) { alert('密码错误'); return; }
                    const t = appState.deleteTarget;
                    if (t.source === 'wall') {
                        appState.wallPosts = appState.wallPosts.filter(p => p.id !== t.postId);
                        await saveData();
                        renderWallPosts();
                    } else if (t.source === 'profile') {
                        const user = appState.profiles[appState.myFingerprint];
                        if (user) {
                            user.posts = user.posts.filter(p => p.id !== t.postId);
                            await saveData();
                            renderProfile(appState.myFingerprint);
                        }
                    }
                    deleteDialog.classList.remove('show');
                });
            })();
        })();
    </script>
</body>
</html>
